y": 349.76154387296236}}, {"data": {"id": "jaegwon_kim", "label": "Jaegwon Kim", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Jaegwon Kim was a Korean-American philosopher renowned for his work on the mind-body problem, supervenience, and mental causation. He developed a powerful challenge to non-reductive physicalism through his exclusion argument, which argues that mental properties cannot causally influence physical events if they are distinct from physical properties. His work is central to contemporary philosophy of mind and metaphysics.", "born": 1934, "died": 2019, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": 112.31165506602144, "y": 198.23861468515378}}, {"data": {"id": "jason_stanley", "label": "Jason Stanley", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Jason Stanley is an American philosopher known for his work in epistemology, philosophy of language, and political philosophy. He is best known for defending 'knowledge-how' as a form of propositional knowledge and for developing interest-relative invariantism in epistemology. His later work addresses the philosophy of fascism and propaganda.", "born": 1969, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": -140.1672940517744, "y": -242.4422867535713}}, {"data": {"id": "kukai", "label": "Kukai", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Kukai, also known as Kobo Daishi, was a Japanese Buddhist monk, philosopher, and founder of the Shingon school of esoteric Buddhism in Japan. He argued in works like 'Attaining Enlightenment in this Very Existence' that Buddhahood is achievable within a single lifetime through esoteric practices, ritual, and the recognition that the cosmos itself is the body of the cosmic Buddha Mahavairocana. His synthesis of Buddhist metaphysics, aesthetics, and ritual practice made him one of the most influential figures in Japanese intellectual and religious history.", "born": 774, "died": 835, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#a0522d", "degree": 9, "show_label": false}, "position": {"x": -39.59229535419191, "y": 348.5758671417337}}, {"data": {"id": "michael_sandel", "label": "Michael Sandel", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Michael Sandel (born 1953) is an American political philosopher best known for his communitarian critique of John Rawls's liberal theory of justice in 'Liberalism and the Limits of Justice' (1982). He argues that the liberal conception of the self as prior to its ends neglects the constitutive role that community, tradition, and shared values play in forming our identities. His later work on markets, morality, and civic life has made him one of the most widely read political philosophers in public discourse.", "born": 1953, "died": null, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": -205.0524295791746, "y": 179.81693551796363}}, {"data": {"id": "r_g_collingwood", "label": "R.G. Collingwood", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "R.G. Collingwood (1889–1943) was a British philosopher and historian who made major contributions to philosophy of history, aesthetics, and metaphysics. He argued that historical understanding requires re-enacting the thoughts of historical agents in one's own mind, and in aesthetics he developed an expressivist theory of art. His work bridges idealist metaphysics and the practical concerns of historical inquiry.", "born": 1889, "died": 1943, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 9, "show_label": false}, "position": {"x": 311.5708317154291, "y": -199.19594653987747}}, {"data": {"id": "w_d_ross", "label": "W.D. Ross", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "W.D. Ross (1877–1971) was a Scottish philosopher and classicist best known for his work in moral philosophy, particularly his theory of prima facie duties. In The Right and the Good, he argued against utilitarian monism, holding that there are multiple irreducible moral obligations that can conflict and must be weighed in context. Ross's pluralistic deontology remains an important reference point in contemporary ethical theory.", "born": 1877, "died": 1971, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#2e7d32", "degree": 9, "show_label": false}, "position": {"x": 228.20452487324815, "y": -246.66000219145297}}, {"data": {"id": "zhu_xi", "label": "Zhu Xi", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Zhu Xi (1130–1200) was a Chinese Neo-Confucian philosopher who synthesized centuries of Confucian thought into a systematic metaphysics and ethics, becoming the most influential thinker in East Asian intellectual history after Confucius himself. He developed the dualism of li (principle) and qi (material force) as the basis of all reality, and emphasized the 'investigation of things' as the path to moral self-cultivation. His commentaries on the Four Books became the official curriculum for Chinese civil service examinations for over six centuries.", "born": 1130, "died": 1200, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#a0522d", "degree": 9, "show_label": false}, "position": {"x": 62.415927443152945, "y": 252.21063868217203}}, {"data": {"id": "zygmunt_bauman", "label": "Zygmunt Bauman", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Zygmunt Bauman (1925–2017) was a Polish-British sociologist and philosopher best known for his analyses of modernity, postmodernity, and ethics under conditions of social fragmentation. He developed the influential concept of 'liquid modernity' to describe contemporary societies in which traditional structures of identity, community, and authority have dissolved into fluid, unstable forms. His ethical thought emphasized the irreducible moral responsibility of individuals in the face of bureaucratic and consumerist systems that tend to diffuse accountability.", "born": 1925, "died": 2017, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": 360.97803644222665, "y": -102.75965409736918}}, {"data": {"id": "al_ghazali", "label": "Al-Ghazali", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Al-Ghazali (1058–1111) was a Persian Islamic theologian, philosopher, and mystic who profoundly shaped Islamic intellectual history. His 'The Incoherence of the Philosophers' mounted a devastating critique of Aristotelian and Neoplatonic philosophy as incompatible with Islamic theology, while his 'Revival of the Religious Sciences' sought to reconcile orthodox Islam with Sufi mysticism. He is considered one of the most influential thinkers in Islamic history and has been called the 'Proof of Islam'.", "born": 1058, "died": 1111, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#a0522d", "degree": 10, "show_label": false}, "position": {"x": -206.1150810461033, "y": 86.52475842498531}}, {"data": {"id": "alain_badiou", "label": "Alain Badiou", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Alain Badiou (born 1937) is a French philosopher known for his ambitious systematic ontology grounded in set theory and his theory of the 'event' as a rupture in being. In 'Being and Event', he argues that mathematics is ontology and develops concepts of truth, the subject, and fidelity to revolutionary events. He is one of the most prominent and provocative philosophers of the contemporary French tradition.", "born": 1937, "died": null, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 355.6226676277623, "y": -86.52475842498527}}, {"data": {"id": "auguste_comte", "label": "Auguste Comte", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Auguste Comte (1798–1857) was a French philosopher widely regarded as the founder of sociology and positivism. He proposed the 'law of three stages,' arguing that human knowledge progresses from theological through metaphysical to positive (scientific) understanding. His positivist philosophy had a major influence on the development of the social sciences and on later logical positivism.", "born": 1798, "died": 1857, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#2e7d32", "degree": 10, "show_label": false}, "position": {"x": 240.15076477775756, "y": -189.10722476397623}}, {"data": {"id": "christine_korsgaard", "label": "Christine Korsgaard", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Christine Korsgaard (born 1952) is an American moral philosopher and a leading contemporary Kantian ethicist. She is best known for her constructivist account of normativity, arguing that moral obligations are self-legislated through practical identity and reflective endorsement. Her work revitalized Kantian ethics and made significant contributions to debates about the foundations of morality.", "born": 1952, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 236.7651052102408, "y": -157.0534363000606}}, {"data": {"id": "h_l_a_hart", "label": "H.L.A. Hart", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "H.L.A. Hart (1907–1992) was a British legal philosopher and the most influential legal positivist of the twentieth century, best known for The Concept of Law. He argued that law is a system of social rules distinguished by primary rules of obligation and secondary rules of recognition, change, and adjudication, rejecting both crude command theories and natural law accounts. His work shaped contemporary jurisprudence and initiated a productive debate with Lon Fuller and Ronald Dworkin.", "born": 1907, "died": 1992, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 136.41325451163922, "y": -124.02795078546053}}, {"data": {"id": "hans_reichenbach", "label": "Hans Reichenbach", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Hans Reichenbach (1891–1953) was a German-American philosopher of science and a leading figure in logical empiricism, known for his probabilistic approach to scientific knowledge and his philosophy of space and time. He drew a foundational distinction between the context of discovery and the context of justification, and developed a frequency theory of probability applied to inductive logic. His work bridged scientific practice and philosophical analysis, influencing the logical empiricist movement and philosophy of physics.", "born": 1891, "died": 1953, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#2e7d32", "degree": 10, "show_label": false}, "position": {"x": -46.4481229212914, "y": -199.54949118411866}}, {"data": {"id": "james_ladyman", "label": "James Ladyman", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "James Ladyman is a British philosopher of science known for developing ontic structural realism, the view that structure rather than objects is the fundamental feature of reality. Co-authored with Don Ross in 'Every Thing Must Go,' he argues that analytic metaphysics should be naturalized and constrained by contemporary physics. His work challenges traditional object-based ontologies and defends scientific realism.", "born": 1969, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 107.62934613021719, "y": 164.6599973507401}}, {"data": {"id": "mario_bunge", "label": "Mario Bunge", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Mario Bunge (1919–2020) was an Argentine-Canadian philosopher of science and physicist who developed a comprehensive systematic philosophy grounded in scientific realism and materialism. He made significant contributions to the philosophy of medicine, physics, biology, and social science, advocating for a rigorous, scientifically informed approach to philosophical problems. His work stands as one of the most ambitious attempts to build a unified scientific ontology and epistemology in the twentieth century.", "born": 1919, "died": 2020, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 189.860975091057, "y": 53.32441813073499}}, {"data": {"id": "martha_nussbaum", "label": "Martha Nussbaum", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Martha Nussbaum (born 1947) is an American philosopher renowned for her work in ancient Greek philosophy, ethics, political philosophy, and the philosophy of emotions. She developed the capabilities approach in political philosophy alongside Amartya Sen, arguing that human dignity requires the flourishing of a range of core human capabilities. Her interdisciplinary work connecting literature, law, and philosophy has made her one of the most influential public intellectuals of her generation.", "born": 1947, "died": null, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": -241.56307633515587, "y": 203.92044972211949}}, {"data": {"id": "mary_wollstonecraft", "label": "Wollstonecraft", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Mary Wollstonecraft (1759–1797) was a British philosopher and writer widely regarded as one of the founding figures of feminist philosophy. In 'A Vindication of the Rights of Woman' (1792) she argued that women are not naturally inferior to men but appear so only because they lack access to education and rational development. Her work laid the intellectual groundwork for later feminist movements and liberal arguments for gender equality.", "born": 1759, "died": 1797, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 10, "show_label": true}, "position": {"x": 121.30000698436248, "y": -323.06853743771444}}, {"data": {"id": "michel_de_montaigne", "label": "Michel de Montaigne", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Michel de Montaigne (1533–1592) was a French Renaissance philosopher and writer who invented the literary and philosophical form of the essay as a vehicle for personal philosophical reflection. His 'Essais' explore a vast range of topics through the lens of his own experience and self-examination, championing skepticism, tolerance, and a humanistic acceptance of human fallibility. He is a foundational figure of early modern skepticism and humanism, and his influence extends to Descartes, Pascal, and the broader tradition of modern self-reflection.", "born": 1533, "died": 1592, "community_id": "c5", "community_label": "Early Modern Rationalism", "color": "#ffd166", "era_color": "#1a6b8a", "degree": 10, "show_label": false}, "position": {"x": -283.1155073401516, "y": -160.2166036023757}}, {"data": {"id": "patricia_churchland", "label": "Patricia Churchland", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Patricia Churchland (born 1943) is a Canadian-American philosopher who pioneered the field of neurophilosophy, advocating for the integration of neuroscience and philosophy of mind. She argues that traditional philosophical questions about mind, consciousness, and morality must be informed by empirical findings from brain science. Her work challenges folk psychology and promotes a naturalistic, science-based approach to understanding the mind.", "born": 1943, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 186.23075910822814, "y": 141.02733337740744}}, {"data": {"id": "paul_benacerraf", "label": "Paul Benacerraf", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Paul Benacerraf (born 1931) is an American philosopher of mathematics best known for two landmark papers that posed fundamental challenges to mathematical platonism. In 'What Numbers Could Not Be' he argued that numbers cannot be identified with sets, and in 'Mathematical Truth' he posed the epistemological challenge for platonism known as the 'Benacerraf dilemma'. His work set the agenda for contemporary philosophy of mathematics by sharpening debates about mathematical ontology and knowledge.", "born": 1931, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": -46.97298272297817, "y": -393.4028119549308}}, {"data": {"id": "paul_churchland", "label": "Paul Churchland", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Paul Churchland (born 1942) is a Canadian philosopher of mind who developed and defended eliminative materialism, the view that folk psychological concepts like 'beliefs' and 'desires' will ultimately be replaced by mature neuroscience. His work explores how a scientific understanding of the brain can transform our concepts of mind, knowledge, and perception. Churchland is a leading figure in naturalizing philosophy of mind and advocating for neural network models of cognition.", "born": 1942, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 191.215176066013, "y": 185.7563885014017}}, {"data": {"id": "richard_swinburne", "label": "Richard Swinburne", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Richard Swinburne (born 1934) is a British philosopher of religion who has developed rigorous probabilistic arguments for the existence of God and the rationality of theistic belief. In 'The Existence of God' he employs Bayesian reasoning to argue that theism provides the simplest and most powerful explanation for the existence and order of the universe. His work revitalized analytic philosophy of religion in the late twentieth century.", "born": 1934, "died": null, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": -129.8234542102137, "y": 150.4188223355332}}, {"data": {"id": "roderick_chisholm", "label": "Roderick Chisholm", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Roderick Chisholm (1916–1999) was an American philosopher who made foundational contributions to epistemology, metaphysics, and the philosophy of mind. He defended epistemic foundationalism, arguing that some beliefs are directly justified without inference, and developed influential accounts of intentionality, personal identity, and free will. His rigorous analytical style and careful attention to classical philosophical problems made him one of the most important American philosophers of the twentieth century.", "born": 1916, "died": 1999, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 26.25393547323166, "y": -377.9810210847355}}, {"data": {"id": "saint_bonaventure", "label": "Saint Bonaventure", "type": "Philosopher", "era": "Medieval", "tradition": "Western", "abstract": "Saint Bonaventure (1221–1274) was an Italian Franciscan theologian and philosopher, often called the 'Seraphic Doctor,' who synthesized Augustinian theology with Aristotelian philosophy in a mystical framework. He emphasized the soul's journey to God through illumination and contemplation, as expressed in his 'Itinerarium Mentis in Deum.' His thought represents a major strand of medieval Christian Platonism and deeply influenced scholastic theology.", "born": 1221, "died": 1274, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#a0522d", "degree": 10, "show_label": false}, "position": {"x": -284.6660901488075, "y": 29.986894456909674}}, {"data": {"id": "sir_francis_bacon", "label": "Sir Francis Bacon", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Sir Francis Bacon (1561–1626) was an English philosopher, statesman, and essayist who championed the empirical method and laid the foundations for modern scientific inquiry. In his 'Novum Organum,' he critiqued the Aristotelian syllogistic method and proposed inductive reasoning based on systematic observation and experiment as the proper path to knowledge. He is widely regarded as the father of empiricism and a seminal figure in the Scientific Revolution.", "born": 1561, "died": 1626, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 10, "show_label": false}, "position": {"x": 211.14466136804066, "y": -287.61201317696833}}, {"data": {"id": "stanley_cavell", "label": "Stanley Cavell", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Stanley Cavell (1926–2018) was an American philosopher known for his original and literary engagement with ordinary language philosophy, skepticism, and moral perfectionism. Drawing on Wittgenstein and Austin, he argued that philosophical skepticism is less a theoretical problem to be solved than a human condition to be acknowledged. His wide-ranging work also addressed aesthetics, film, literature, and the philosophy of Emerson and Thoreau.", "born": 1926, "died": 2018, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": 97.87758557403129, "y": -377.8775855740313}}, {"data": {"id": "william_lane_craig", "label": "William Lane Craig", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "William Lane Craig (born 1949) is an American analytic philosopher and Christian theologian best known for his defense of the Kalam Cosmological Argument, which posits that because the universe began to exist, it must have a cause — identified with God. He is one of the most prominent contemporary defenders of philosophical theism and has engaged extensively in debates on the existence of God, divine foreknowledge, and the resurrection of Jesus. His work has significantly shaped contemporary philosophy of religion.", "born": 1949, "died": null, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 10, "show_label": false}, "position": {"x": -116.53801191193412, "y": 195.6501305486073}}, {"data": {"id": "william_of_ockham", "label": "William of Ockham", "type": "Philosopher", "era": "Medieval", "tradition": "Western", "abstract": "William of Ockham (c. 1287–1347) was an English Franciscan friar and scholastic philosopher whose nominalism challenged the dominant realist metaphysics of the Middle Ages. He is famous for 'Ockham's Razor,' the methodological principle that entities should not be multiplied beyond necessity, which he applied to reject universals as real entities independent of the mind. His work in logic, epistemology, and political philosophy had profound influence on late medieval thought and the development of early modern science and theology.", "born": 1287, "died": 1347, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#a0522d", "degree": 10, "show_label": false}, "position": {"x": -202.0650490596886, "y": 39.85836841532401}}, {"data": {"id": "albert_camus", "label": "Albert Camus", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Albert Camus (1913–1960) was a French-Algerian philosopher, novelist, and journalist associated with existentialism and the philosophy of the absurd. In 'The Myth of Sisyphus', he explored the confrontation between the human desire for meaning and the world's indifference, arguing that we must imagine Sisyphus happy and embrace revolt against the absurd. He received the Nobel Prize in Literature in 1957 and remains a defining voice of 20th-century philosophical literature.", "born": 1913, "died": 1960, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": 335.51070882445083, "y": -74.65667462487622}}, {"data": {"id": "alfred_tarski", "label": "Alfred Tarski", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Alfred Tarski (1901–1983) was a Polish-American logician and mathematician who made foundational contributions to logic, semantics, and the philosophy of language. He is best known for his semantic theory of truth, which defines truth in terms of satisfaction and correspondence, and for his undefinability theorem. His rigorous, formal approach to truth and logical consequence transformed mathematical logic and had lasting influence on analytic philosophy.", "born": 1901, "died": 1983, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": 94.57890229707111, "y": -254.65765950847774}}, {"data": {"id": "alvin_goldman", "label": "Alvin Goldman", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Alvin Goldman (born 1938) is an American philosopher who has made foundational contributions to epistemology, the philosophy of mind, and cognitive science. He is best known for developing reliabilism, the view that a belief is justified if it is produced by a reliable cognitive process, and for pioneering social epistemology. His work connects traditional epistemological questions with empirical psychology and cognitive science.", "born": 1938, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": 65.64997793947576, "y": -252.80688876797464}}, {"data": {"id": "d_m_armstrong", "label": "D.M. Armstrong", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "D.M. Armstrong (1926–2014) was an Australian philosopher renowned for his work in metaphysics and philosophy of mind. He defended scientific realism about universals, a materialist theory of mind, and a necessitarian theory of natural laws. His systematic naturalistic metaphysics made him one of the most important analytic metaphysicians of the twentieth century.", "born": 1926, "died": 2014, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": 58.64218634818176, "y": -203.57601483216737}}, {"data": {"id": "g_e_moore", "label": "G.E. Moore", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "G.E. Moore (1873–1958) was a British philosopher and a central figure in the development of analytic philosophy. He is best known in ethics for his intuitionist argument that 'good' is a simple, indefinable property and for identifying the 'naturalistic fallacy,' presented in his landmark work 'Principia Ethica.' His 'Defence of Common Sense' also made foundational contributions to epistemology by defending ordinary knowledge claims against skepticism.", "born": 1873, "died": 1958, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#2e7d32", "degree": 11, "show_label": false}, "position": {"x": 2.6461930815273465e-14, "y": -127.84387410807278}}, {"data": {"id": "george_boolos", "label": "George Boolos", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "George Boolos (1940–1996) was an American philosopher and mathematical logician known for his work on second-order logic, the logic of provability, and the philosophy of mathematics. He developed plural quantification as a means of interpreting second-order logic without commitment to set-theoretic entities, and made significant contributions to Frege's logicist program. His collected essays, Logic, Logic and Logic, remain a landmark in philosophical logic.", "born": 1940, "died": 1996, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": -10.068099032644746, "y": -203.5251953654643}}, {"data": {"id": "herbert_spencer", "label": "Herbert Spencer", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Herbert Spencer was a Victorian British philosopher and sociologist who applied evolutionary principles to philosophy, ethics, psychology, and social theory, coining the phrase 'survival of the fittest.' His ambitious 'System of Synthetic Philosophy' attempted to unify all knowledge under evolutionary principles. He was a leading advocate of social Darwinism and classical liberalism, though his influence waned considerably in the twentieth century.", "born": 1820, "died": 1903, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#2e7d32", "degree": 11, "show_label": false}, "position": {"x": 90.78080171571702, "y": -143.71579336458058}}, {"data": {"id": "kongzi", "label": "Kongzi", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Kongzi, known in the West as Confucius, was the foundational figure of Confucian philosophy in ancient China, whose teachings emphasized moral self-cultivation, ritual propriety, and the importance of harmonious social relationships. His collected sayings in the Analects articulate a vision of ethical life centered on ren (benevolence), li (ritual propriety), and the rectification of names. His philosophy profoundly shaped Chinese civilization, East Asian culture, and remains a major tradition in world philosophy.", "born": -551, "died": -479, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#c9a227", "degree": 11, "show_label": true}, "position": {"x": -7.82995380711519, "y": 354.4970341806218}}, {"data": {"id": "laozi", "label": "Laozi", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Laozi is the legendary founder of Daoism and the reputed author of the Dao De Jing, one of the most influential texts in Chinese philosophy and world literature. His philosophy centers on the Dao (the Way) as the ineffable, primordial principle underlying all reality, and advocates wu wei (non-action or effortless action) as the ideal mode of living in harmony with nature. Whether historical or legendary, Laozi's thought profoundly shaped Chinese culture, religion, and philosophy across millennia.", "born": -571, "died": -471, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#c9a227", "degree": 11, "show_label": false}, "position": {"x": -63.24212717175349, "y": 325.9480949518023}}, {"data": {"id": "maurice_merleau_ponty", "label": "Maurice Merleau-Ponty", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Maurice Merleau-Ponty (1908–1961) was a French phenomenologist who placed embodiment at the center of philosophical inquiry, arguing in 'Phenomenology of Perception' (1945) that perception and consciousness are fundamentally shaped by our lived bodily existence. He challenged both empiricist and intellectualist accounts of perception, proposing instead that the body is the primary site of knowing and being-in-the-world. His work profoundly influenced cognitive science, psychology, feminist philosophy, and the philosophy of art.", "born": 1908, "died": 1961, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": 209.30194836941843, "y": -141.1489641931966}}, {"data": {"id": "p_f_strawson", "label": "P.F. Strawson", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "P.F. Strawson (1919–2006) was a British analytic philosopher whose work spanned metaphysics, philosophy of language, and ethics. His essay 'Freedom and Resentment' revitalized compatibilist debates about free will by grounding moral responsibility in reactive attitudes like gratitude and resentment. He also made major contributions to the theory of reference, descriptive metaphysics, and the critique of Kantian philosophy.", "born": 1919, "died": 2006, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": -57.41076046385221, "y": -379.4383540245585}}, {"data": {"id": "paulo_freire", "label": "Paulo Freire", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Paulo Freire (1921–1997) was a Brazilian educator and philosopher whose 'Pedagogy of the Oppressed' became a foundational text of critical pedagogy and liberation education. He argued that traditional 'banking' education dehumanizes students and that transformative education must be dialogical, empowering learners to critically engage with and transform their social reality. Freire's work has profoundly influenced educational theory, social justice movements, and postcolonial thought worldwide.", "born": 1921, "died": 1997, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": 290.7592630177395, "y": -200.03551069282383}}, {"data": {"id": "terry_eagleton", "label": "Terry Eagleton", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Terry Eagleton (born 1943) is a British literary theorist and philosopher known for his Marxist critiques of culture, literature, postmodernism, and higher education. His work bridges literary theory, cultural criticism, and political philosophy, challenging the assumptions of postmodern relativism and defending the relevance of radical political thought. He is one of the most prominent public intellectuals in the Anglophone world.", "born": 1943, "died": null, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": 344.6945936597341, "y": -130.3209384791839}}, {"data": {"id": "theodore_sider", "label": "Theodore Sider", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Theodore Sider (born 1967) is an American philosopher specializing in metaphysics, logic, and the philosophy of language. He is best known for his defense of four-dimensionalism about persistence through time and his work on ontological structure and naturalness in Writing the Book of the World. Sider's contributions have significantly shaped contemporary analytic metaphysics.", "born": 1967, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 11, "show_label": false}, "position": {"x": 74.76125120988625, "y": -310.9671241911169}}, {"data": {"id": "alfred_north_whitehead", "label": "Alfred North Whitehead", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Alfred North Whitehead (1861–1947) was a British mathematician and philosopher who co-authored 'Principia Mathematica' with Bertrand Russell and later developed an influential metaphysical system known as process philosophy in 'Process and Reality'. He argued that reality is fundamentally constituted by dynamic processes and events rather than static substances. His process philosophy has influenced theology, cosmology, and philosophy of science.", "born": 1861, "died": 1947, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#2e7d32", "degree": 12, "show_label": false}, "position": {"x": 104.14890631164509, "y": -266.2885363630762}}, {"data": {"id": "georg_lukacs", "label": "Georg Lukacs", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Georg Lukács (1885–1971) was a Hungarian Marxist philosopher and literary critic who made foundational contributions to Western Marxism and critical theory. His 'History and Class Consciousness' developed the concept of reification and introduced the notion of class consciousness as a central Marxist philosophical concern. Lukács's work bridged German Idealism and Marxism and had a major influence on the Frankfurt School and subsequent critical theory.", "born": 1885, "died": 1971, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 12, "show_label": false}, "position": {"x": 304.9509873275544, "y": 9.672313412011448}}, {"data": {"id": "imre_lakatos", "label": "Imre Lakatos", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Imre Lakatos was a Hungarian-British philosopher of mathematics and science who developed the methodology of scientific research programmes as an alternative to both Popperian falsificationism and Kuhnian relativism. In 'Proofs and Refutations' he showed through historical case studies how mathematical knowledge grows through a dialectical process of proofs and counter-examples. His work bridged philosophy of science and philosophy of mathematics and remains central to debates about rationality and scientific progress.", "born": 1922, "died": 1974, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 12, "show_label": false}, "position": {"x": 258.62186705626704, "y": 198.71404603552742}}, {"data": {"id": "michael_dummett", "label": "Michael Dummett", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Michael Dummett (1925–2011) was a British philosopher who made landmark contributions to the philosophy of language, logic, and mathematics, primarily through his work on Gottlob Frege and his development of anti-realism grounded in meaning theory. He argued that the meaning of a statement is determined by its conditions of assertibility rather than its truth conditions, challenging classical logic and supporting intuitionist logic. His work on Frege rehabilitated that philosopher's importance and his own anti-realist program shaped debates in metaphysics and philosophy of language for decades.", "born": 1925, "died": 2011, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 12, "show_label": false}, "position": {"x": -52.79910468624588, "y": -332.79910468624587}}, {"data": {"id": "nelson_goodman", "label": "Nelson Goodman", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Nelson Goodman (1906–1998) was an American philosopher who made major contributions to aesthetics, epistemology, and the philosophy of science. He introduced the concept of 'worldmaking' and the 'grue' paradox to challenge assumptions about induction, reference, and symbolic systems. His work in 'Languages of Art' developed a rigorous theory of how symbols function across the arts and sciences.", "born": 1906, "died": 1998, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 12, "show_label": false}, "position": {"x": -57.57011712792249, "y": -355.0268373585486}}, {"data": {"id": "paul_feyerabend", "label": "Paul Feyerabend", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Paul Feyerabend (1924–1994) was an Austrian-American philosopher of science who famously argued in 'Against Method' that there is no single scientific method and that science progresses through theoretical anarchism. He contended that science is not inherently superior to other forms of knowledge and challenged the authority of scientific institutions. His provocative work has been influential in science studies, philosophy of science, and debates about rationalism and relativism.", "born": 1924, "died": 1994, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 12, "show_label": false}, "position": {"x": 202.96688381108865, "y": -3.1919112205526545}}, {"data": {"id": "paul_ric_ur", "label": "Paul Ricœur", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Paul Ricœur (1913–2005) was a French philosopher who synthesized phenomenology, hermeneutics, and analytic philosophy to explore questions of interpretation, narrative, and selfhood. His work on 'narrative identity' argued that personal identity is constituted through the stories we tell about ourselves. Ricœur is recognized as one of the most important Continental philosophers of the twentieth century for bridging French and Anglo-American philosophical traditions.", "born": 1913, "died": 2005, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 12, "show_label": false}, "position": {"x": 270.35271300014165, "y": -182.02707076943108}}, {"data": {"id": "ronald_dworkin", "label": "Ronald Dworkin", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Ronald Dworkin (1931–2013) was an American philosopher of law and political philosophy who challenged legal positivism and developed a rights-based theory of law and morality. He argued that law is an interpretive practice aiming at its best moral justification, and that individual rights function as 'trumps' over utilitarian calculations. His work has been enormously influential in jurisprudence, constitutional theory, and liberal political philosophy.", "born": 1931, "died": 2013, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 12, "show_label": false}, "position": {"x": 194.98219840621957, "y": -311.1739284472874}}, {"data": {"id": "timothy_williamson", "label": "Timothy Williamson", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Timothy Williamson (born 1955) is a British philosopher known for his influential contributions to epistemology, metaphysics, and logic. His book Knowledge and Its Limits argued that knowledge is a primitive mental state not analyzable into simpler components, challenging the traditional justified true belief account. His work on modal logic and metaphysics has also shaped debates about the relationship between possibility, necessity, and existence.", "born": 1955, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 12, "show_label": false}, "position": {"x": 99.34186859980133, "y": -306.61857346591546}}, {"data": {"id": "a_j_ayer", "label": "A.J. Ayer", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "A.J. Ayer (1910–1989) was a British philosopher best known for introducing logical positivism to the English-speaking world through his landmark work 'Language, Truth, and Logic'. He championed the verification principle, arguing that only empirically verifiable or analytically true statements are meaningful. His work had a profound impact on analytic philosophy, shaping debates in metaphysics, ethics, and the philosophy of language.", "born": 1910, "died": 1989, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 13, "show_label": false}, "position": {"x": 114.99762755489408, "y": -280.0}}, {"data": {"id": "alasdair_macintyre", "label": "Alasdair MacIntyre", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Alasdair MacIntyre (born 1929) is a Scottish-American philosopher renowned for his critique of Enlightenment moral philosophy and his revival of Aristotelian virtue ethics in 'After Virtue'. He argues that modern moral discourse is fragmented and incoherent, and that a return to virtue-based, tradition-embedded moral reasoning is necessary. His work has been enormously influential in ethics, political philosophy, and the philosophy of social science.", "born": 1929, "died": null, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 13, "show_label": false}, "position": {"x": -79.49933781570442, "y": 226.5247584249853}}, {"data": {"id": "bas_c_van_fraassen", "label": "Bas C. van Fraassen", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Bas C. van Fraassen (born 1941) is a Dutch-American philosopher of science best known for developing 'constructive empiricism,' the view that science aims to produce empirically adequate theories rather than true descriptions of unobservable entities. His landmark work 'The Scientific Image' challenged scientific realism and revitalized anti-realist philosophy of science. He has also made significant contributions to formal epistemology and the philosophy of quantum mechanics.", "born": 1941, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 13, "show_label": false}, "position": {"x": 72.74861176336569, "y": -237.99856941524928}}, {"data": {"id": "derek_parfit", "label": "Derek Parfit", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Derek Parfit (1942–2017) was a British moral philosopher and metaphysician who made profound contributions to personal identity, ethics, and rationality. In 'Reasons and Persons,' he argued against self-interest theory and explored how reductionist views of personal identity have surprising ethical implications. He is widely regarded as one of the greatest moral philosophers of the twentieth century, known for his defense of objectivism in ethics in 'On What Matters.'", "born": 1942, "died": 2017, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 13, "show_label": false}, "position": {"x": 200.5936473324177, "y": -126.25163691096351}}, {"data": {"id": "larry_laudan", "label": "Larry Laudan", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Larry Laudan is an American philosopher of science who challenged both positivist and Popperian accounts of science, most famously arguing in 'The Demise of the Demarcation Problem' that the distinction between science and non-science cannot be drawn on principled philosophical grounds. He developed a 'problem-solving' model of scientific progress as an alternative to truth-based accounts, and his 'pessimistic meta-induction' challenged scientific realism by noting that historically successful theories have often been abandoned. Laudan's work reshaped debates in philosophy of science about rationality, progress, and the boundaries of scientific inquiry.", "born": 1941, "died": 2022, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 13, "show_label": false}, "position": {"x": 196.9211820142023, "y": 96.06008356598069}}, {"data": {"id": "penelope_maddy", "label": "Penelope Maddy", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Penelope Maddy (born 1950) is an American philosopher of mathematics and logic who has developed influential positions on mathematical realism and naturalism. Her 'Second Philosophy' advocates a naturalistic approach to philosophy that takes the methods and results of science as the starting point for philosophical inquiry, including inquiry into mathematics. Maddy is particularly known for her work on mathematical set theory, realism, and the foundations of mathematics.", "born": 1950, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 13, "show_label": false}, "position": {"x": -33.04531808696694, "y": -403.32680605283554}}, {"data": {"id": "adam_smith", "label": "Adam Smith", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Adam Smith (1723–1790) was a Scottish Enlightenment philosopher and economist whose works laid the foundations of classical economics and moral philosophy. In 'The Wealth of Nations' he articulated the theory of the invisible hand and the division of labour, while 'The Theory of Moral Sentiments' explored sympathy as the basis of moral judgment. He is widely regarded as the father of modern economics and a towering figure of the Scottish Enlightenment.", "born": 1723, "died": 1790, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 14, "show_label": true}, "position": {"x": 228.42386701146262, "y": -226.5247584249853}}, {"data": {"id": "arthur_schopenhauer", "label": "Arthur Schopenhauer", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Arthur Schopenhauer (1788–1860) was a German philosopher whose central work, 'The World as Will and Representation,' argued that the fundamental reality underlying all phenomena is a blind, striving force he called the Will. He drew heavily on Kant's transcendental idealism and on Hindu and Buddhist thought, developing a pessimistic metaphysics and an aesthetics that emphasized art and asceticism as paths to relief from suffering. His philosophy profoundly influenced Nietzsche, Freud, and Wittgenstein.", "born": 1788, "died": 1860, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 14, "show_label": false}, "position": {"x": 348.2033623603145, "y": -57.58498426759205}}, {"data": {"id": "duns_scotus", "label": "Duns Scotus", "type": "Philosopher", "era": "Medieval", "tradition": "Western", "abstract": "John Duns Scotus (c. 1266–1308) was a Scottish Franciscan friar and one of the most important scholastic philosophers and theologians of the Medieval period. He developed influential doctrines including the univocity of being, haecceity (individual essence), and a voluntarist account of free will and morality. His sophisticated metaphysical and theological arguments earned him the title 'Doctor Subtilis.'", "born": 1266, "died": 1308, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#a0522d", "degree": 14, "show_label": false}, "position": {"x": -302.44541126812345, "y": 112.78897053633409}}, {"data": {"id": "hartry_field", "label": "Hartry Field", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Hartry Field is an American philosopher of mathematics and logic known for defending mathematical nominalism—the view that mathematical objects do not exist. In 'Science without Numbers' he argued that mathematics is not indispensable to science, since physical theories can be reformulated without quantifying over mathematical entities. His work reshaped debates about mathematical realism, truth, and the nature of logic.", "born": 1946, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 14, "show_label": false}, "position": {"x": -55.31877176537802, "y": -207.90717304094767}}, {"data": {"id": "henri_bergson", "label": "Henri Bergson", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Henri Bergson was a French philosopher of the late nineteenth and early twentieth centuries who emphasized the primacy of time, consciousness, and lived experience over mechanistic and spatial conceptions of reality. He introduced the concept of 'durée' (duration) to capture the continuous flow of inner time as opposed to the discrete, measurable time of science. His work profoundly influenced process philosophy, existentialism, and twentieth-century literature and art.", "born": 1859, "died": 1941, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 14, "show_label": false}, "position": {"x": 234.75432239153827, "y": 16.46905933119325}}, {"data": {"id": "j_l_austin", "label": "J.L. Austin", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "J.L. Austin was a British philosopher of the mid-twentieth century and a leading figure of Oxford ordinary language philosophy. He developed the theory of speech acts, distinguishing locutionary, illocutionary, and perlocutionary acts, and introduced the concept of 'performative utterances'—statements that do things rather than merely describe things. His meticulous attention to the nuances of ordinary language exerted lasting influence on philosophy of language, linguistics, and legal theory.", "born": 1911, "died": 1960, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 14, "show_label": false}, "position": {"x": -95.54927729507041, "y": -224.8345990328169}}, {"data": {"id": "j_l_mackie", "label": "J.L. Mackie", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "J.L. Mackie was an Australian analytic philosopher best known for his moral error theory, which holds that moral claims purport to be objective but are systematically false because no objective moral facts exist. He also advanced influential arguments in the philosophy of religion, including a rigorous formulation of the problem of evil. His work remains central to metaethics and the philosophy of religion.", "born": 1917, "died": 1981, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 14, "show_label": false}, "position": {"x": 104.13873169957242, "y": -202.16479091083784}}, {"data": {"id": "max_horkheimer", "label": "Max Horkheimer", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Max Horkheimer (1895–1973) was a German-Jewish philosopher and sociologist, a leading figure of the Frankfurt School who developed critical theory as a mode of social and philosophical analysis. Together with Theodor Adorno he co-authored 'Dialectic of Enlightenment' (1944), arguing that Enlightenment rationality had become a tool of domination rather than liberation. His distinction between traditional and critical theory remains foundational for understanding the relationship between knowledge, society, and emancipation.", "born": 1895, "died": 1973, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 14, "show_label": false}, "position": {"x": 209.22011111642536, "y": -163.69621749090618}}, {"data": {"id": "robert_brandom", "label": "Robert Brandom", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Robert Brandom (born 1950) is an American philosopher known for his inferentialist theory of meaning, developed most fully in 'Making it Explicit'. He argues that the content of concepts and linguistic expressions is determined by their inferential roles within social practices of giving and asking for reasons. His work represents a major development in the philosophy of language and mind, synthesizing analytic philosophy with themes from German idealism.", "born": 1950, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 14, "show_label": false}, "position": {"x": 17.596186779656552, "y": -413.65630809985635}}, {"data": {"id": "robert_nozick", "label": "Robert Nozick", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Robert Nozick (1938–2002) was an American philosopher best known for his libertarian political philosophy articulated in 'Anarchy, State, and Utopia', a response to John Rawls's egalitarianism. He argued that only a minimal state limited to protecting individual rights against force and theft can be justified, and that redistributive taxation violates individual rights as a form of forced labor. He also made significant contributions to epistemology with his tracking theory of knowledge.", "born": 1938, "died": 2002, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 14, "show_label": false}, "position": {"x": 182.55340410848694, "y": -319.2011833973131}}, {"data": {"id": "gilbert_ryle", "label": "Gilbert Ryle", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Gilbert Ryle (1900–1976) was a British philosopher and leading figure in ordinary language philosophy, best known for The Concept of Mind, in which he attacked Cartesian dualism as a 'category mistake' produced by the 'ghost in the machine.' He argued that mental concepts do not refer to inner private events but are analyzed through behavioral dispositions and public language. His work was pivotal in shaping analytic philosophy of mind.", "born": 1900, "died": 1976, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 15, "show_label": false}, "position": {"x": 66.63676085869268, "y": 242.86857277574424}}, {"data": {"id": "john_finnis", "label": "John Finnis", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "John Finnis (born 1940) is an Australian legal philosopher and ethicist best known for reviving natural law theory in the analytic tradition. His major work 'Natural Law and Natural Rights' grounds legal and moral obligations in a set of basic human goods and practical reasonableness. He is a central figure in contemporary jurisprudence and Catholic moral philosophy.", "born": 1940, "died": null, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 15, "show_label": false}, "position": {"x": -216.06334634887634, "y": 285.9398566817114}}, {"data": {"id": "kurt_g_del", "label": "Kurt Gödel", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Kurt Gödel was an Austrian-American logician and mathematician whose incompleteness theorems demonstrated that within any sufficiently powerful formal system, there are true statements that cannot be proved within that system, and that no such system can prove its own consistency. These results fundamentally transformed the foundations of mathematics and had profound implications for logic, philosophy of mathematics, and epistemology. Gödel's work stands as one of the most important intellectual achievements of the twentieth century.", "born": 1906, "died": 1978, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 15, "show_label": false}, "position": {"x": -124.54785158034375, "y": -331.58940928900967}}, {"data": {"id": "louis_althusser", "label": "Louis Althusser", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Louis Althusser was a French Marxist philosopher who sought to reconstruct Marxism on rigorously scientific foundations, arguing in works like 'Reading Capital' that Marx's mature thought represented an 'epistemological break' from humanist ideology. He introduced the concept of ideological state apparatuses to analyze how ruling-class ideology is reproduced through institutions like schools and churches, and theorized 'overdetermination' and 'structural causality' as key features of social formations. Althusser's structuralist Marxism was enormously influential in literary theory, sociology, and political philosophy.", "born": 1918, "died": 1990, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 15, "show_label": false}, "position": {"x": 188.2119464764777, "y": -106.85621896679159}}, {"data": {"id": "michel_foucault", "label": "Michel Foucault", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Michel Foucault (1926–1984) was a French philosopher and historian of ideas whose analyses of power, knowledge, and discourse transformed the humanities and social sciences. Through genealogical and archaeological methods, he examined how institutions such as prisons, clinics, and schools produce subjects, normalize behavior, and exercise power. His concepts of biopower, disciplinary society, and the episteme have been enormously influential across philosophy, sociology, cultural studies, and political theory.", "born": 1926, "died": 1984, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 15, "show_label": true}, "position": {"x": 249.91596113355507, "y": -214.43746939082138}}, {"data": {"id": "peter_singer", "label": "Peter Singer", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Peter Singer (born 1946) is an Australian moral philosopher best known for his work in applied ethics, particularly animal liberation and effective altruism. He argued that the capacity to suffer, not species membership, is the morally relevant criterion for moral consideration, challenging speciesism. His utilitarian approach has had profound influence on contemporary debates about animal rights, global poverty, and bioethics.", "born": 1946, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 15, "show_label": false}, "position": {"x": 168.2748599328118, "y": -322.9219990929838}}, {"data": {"id": "simone_de_beauvoir", "label": "Simone de Beauvoir", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Simone de Beauvoir (1908–1986) was a French existentialist philosopher, novelist, and feminist theorist whose work 'The Second Sex' laid the groundwork for second-wave feminism. She famously argued that 'one is not born, but rather becomes, a woman,' exposing the social construction of femininity and women's subordination. Her philosophical contributions span existentialist ethics, political theory, and the phenomenology of oppression.", "born": 1908, "died": 1986, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 15, "show_label": true}, "position": {"x": 343.74448939497216, "y": -174.52353559948813}}, {"data": {"id": "thomas_samuel_kuhn", "label": "Thomas Samuel Kuhn", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Thomas Samuel Kuhn (1922–1996) was an American philosopher and historian of science whose landmark work The Structure of Scientific Revolutions transformed the philosophy of science. He introduced the concepts of paradigm and paradigm shift to describe how science progresses through revolutionary rather than purely cumulative changes. Kuhn's ideas have had enormous influence across philosophy, sociology of knowledge, and the history of science.", "born": 1922, "died": 1996, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 15, "show_label": false}, "position": {"x": 334.3717945196982, "y": 13.633192922670801}}, {"data": {"id": "bernard_williams", "label": "Bernard Williams", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Bernard Williams (1929–2003) was a British moral philosopher who was one of the most important and trenchant critics of systematic ethical theory in the twentieth century. He argued against both utilitarianism and Kantian ethics on the grounds that they fail to take seriously the integrity of individuals and the importance of personal commitments ('ground projects'). His work on moral luck, the nature of truth, and the history of Greek ethics has deeply shaped contemporary moral philosophy.", "born": 1929, "died": 2003, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 16, "show_label": false}, "position": {"x": 279.4230718539284, "y": -145.74585522655826}}, {"data": {"id": "david_chalmers", "label": "David Chalmers", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "David Chalmers (born 1966) is an Australian philosopher of mind and language best known for articulating the 'hard problem of consciousness'—the question of why physical processes give rise to subjective experience. He defends property dualism and argues that consciousness cannot be fully explained in purely functional or physical terms. His work has shaped contemporary debates in philosophy of mind, philosophy of language, and metaphysics.", "born": 1966, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 16, "show_label": false}, "position": {"x": 176.56464617680433, "y": 273.85156672670433}}, {"data": {"id": "david_k_lewis", "label": "David K. Lewis", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "David K. Lewis (1941–2001) was an American philosopher who made landmark contributions to metaphysics, philosophy of language, and philosophical logic. He is best known for his doctrine of modal realism, the view that all possible worlds are equally real concrete entities, and for his analyses of causation, counterfactuals, and mental content. His systematic and rigorous approach made him one of the most influential analytic philosophers of the twentieth century.", "born": 1941, "died": 2001, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 16, "show_label": false}, "position": {"x": 60.44859978287505, "y": -175.29995392966345}}, {"data": {"id": "donald_davidson", "label": "Donald Davidson", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Donald Davidson (1917–2003) was an American philosopher who made major contributions to the philosophy of language, mind, and action. He is best known for his truth-conditional semantics, the anomalous monism thesis in philosophy of mind, and the rejection of the scheme-content dualism. His work profoundly shaped analytic philosophy in the latter half of the twentieth century.", "born": 1917, "died": 2003, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 16, "show_label": false}, "position": {"x": 38.83394622082189, "y": -135.06973964549536}}, {"data": {"id": "george_berkeley", "label": "George Berkeley", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "George Berkeley (1685–1753) was an Irish philosopher and Bishop of Cloyne best known for his idealist thesis that material objects do not exist independently of perception. His central claim, 'esse est percipi' (to be is to be perceived), challenged Lockean materialism and grounded reality in minds and ideas. He is a foundational figure in the empiricist tradition and the philosophy of perception.", "born": 1685, "died": 1753, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 16, "show_label": false}, "position": {"x": 153.07140291011473, "y": -126.8369800475594}}, {"data": {"id": "gottfried_leibniz", "label": "Gottfried Leibniz", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Gottfried Wilhelm Leibniz (1646–1716) was a German polymath and rationalist philosopher who made foundational contributions to metaphysics, mathematics, and logic, co-inventing calculus independently of Newton. His metaphysics posits that reality is composed of simple, immaterial substances called monads, each reflecting the universe from its own perspective. He also developed the principle of sufficient reason, the identity of indiscernibles, and a theodicy defending the claim that this is the best of all possible worlds.", "born": 1646, "died": 1716, "community_id": "c5", "community_label": "Early Modern Rationalism", "color": "#ffd166", "era_color": "#1a6b8a", "degree": 16, "show_label": false}, "position": {"x": -322.8706501618492, "y": -59.279758352945095}}, {"data": {"id": "hans_georg_gadamer", "label": "Hans-Georg Gadamer", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Hans-Georg Gadamer (1900–2002) was a German philosopher and the central figure of philosophical hermeneutics, developing in Truth and Method an account of understanding as a historically situated, dialogical event involving the 'fusion of horizons.' He argued against methodological approaches to the human sciences, emphasizing the role of tradition, language, and prejudice as constitutive of all understanding. Gadamer's work profoundly influenced continental philosophy, literary theory, and the philosophy of the social sciences.", "born": 1900, "died": 2002, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 16, "show_label": false}, "position": {"x": 253.97317377149147, "y": 9.70459512276112}}, {"data": {"id": "henry_sidgwick", "label": "Henry Sidgwick", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Henry Sidgwick was a Victorian British moral philosopher whose 'The Methods of Ethics' is regarded as one of the most rigorous works of systematic ethical theory in the English language. He examined three main methods of ethics—egoism, intuitionism, and utilitarianism—and sought to reconcile them, ultimately defending a form of utilitarianism grounded in rational intuitions. His work laid foundational groundwork for twentieth-century analytic ethics and influenced later philosophers such as G.E. Moore and Derek Parfit.", "born": 1838, "died": 1900, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#2e7d32", "degree": 16, "show_label": false}, "position": {"x": 111.15529835239187, "y": -144.0276724867369}}, {"data": {"id": "hugo_grotius", "label": "Hugo Grotius", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Hugo Grotius was a Dutch jurist, theologian, and philosopher of the early seventeenth century widely regarded as the father of international law. His 'De iure belli ac pacis' ('On the Law of War and Peace') systematized natural law theory as a foundation for relations between sovereign states, arguing that certain moral norms bind nations regardless of their particular laws or religion. His work established foundational principles of just war theory, sovereignty, and international rights.", "born": 1583, "died": 1645, "community_id": "c5", "community_label": "Early Modern Rationalism", "color": "#ffd166", "era_color": "#1a6b8a", "degree": 16, "show_label": true}, "position": {"x": -308.2858718368979, "y": -106.74609943479464}}, {"data": {"id": "john_mcdowell", "label": "John McDowell", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "John McDowell (born 1942) is a South African-born British philosopher working in philosophy of mind, ethics, and epistemology. In 'Mind and World' he argues for a form of naturalism that preserves the space of reasons as irreducible to mere natural-scientific description, drawing heavily on Kant and Wittgenstein. His moral philosophy defends a neo-Aristotelian virtue ethics that treats moral perception as a form of practical wisdom.", "born": 1942, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 16, "show_label": false}, "position": {"x": -133.5690080945658, "y": -262.41530648407934}}, {"data": {"id": "s_ren_kierkegaard", "label": "Søren Kierkegaard", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Søren Kierkegaard (1813–1855) was a Danish philosopher and theologian widely regarded as the father of existentialism. He explored the nature of individual existence, faith, anxiety, and despair through works that often employed pseudonyms to present multiple perspectives. His insistence on subjective truth and the primacy of personal choice profoundly shaped 20th-century existentialist, theological, and philosophical thought.", "born": 1813, "died": 1855, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 16, "show_label": true}, "position": {"x": 317.9733421612198, "y": -128.25143973214796}}, {"data": {"id": "alvin_plantinga", "label": "Alvin Plantinga", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Alvin Plantinga (born 1932) is an American Christian philosopher and one of the most prominent figures in analytic philosophy of religion. He is known for reviving the ontological argument, developing the free will defense against the problem of evil, and articulating the concept of 'properly basic beliefs' to justify belief in God without evidential argument. His work transformed philosophy of religion into a rigorous analytic discipline.", "born": 1932, "died": null, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 17, "show_label": false}, "position": {"x": -106.93813563167717, "y": 263.56885217232826}}, {"data": {"id": "herbert_marcuse", "label": "Herbert Marcuse", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Herbert Marcuse was a German-American philosopher and critical theorist associated with the Frankfurt School who developed a synthesis of Marxism, Freudian psychoanalysis, and Hegelian philosophy. He critiqued advanced industrial society for creating 'one-dimensional' people whose capacity for critical thought and genuine freedom is suppressed by consumer culture and technological rationality. His work was enormously influential on the New Left and the counterculture movements of the 1960s.", "born": 1898, "died": 1979, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 17, "show_label": false}, "position": {"x": 207.06125173860462, "y": 30.960007927742765}}, {"data": {"id": "saul_kripke", "label": "Saul Kripke", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Saul Kripke (1940–2022) was an American philosopher and logician who revolutionized both modal logic and philosophy of language. In 'Naming and Necessity,' he argued against descriptivist theories of names, introducing the concept of rigid designators and reviving essentialism. His work fundamentally reshaped debates in metaphysics, semantics, and the philosophy of mind.", "born": 1940, "died": 2022, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 17, "show_label": false}, "position": {"x": 44.15873676782496, "y": -356.48517567993264}}, {"data": {"id": "gilles_deleuze", "label": "Gilles Deleuze", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Gilles Deleuze (1925–1995) was a French philosopher whose work spans metaphysics, aesthetics, and political philosophy, emphasizing difference, multiplicity, and becoming over identity and representation. Together with Félix Guattari, he developed concepts such as 'rhizome,' 'deterritorialization,' and 'desiring-machines' that became foundational for post-structuralist thought. His philosophy challenges fixed categories and structures, advocating for a creative, affirmative view of difference.", "born": 1925, "died": 1995, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 18, "show_label": true}, "position": {"x": 272.1557745279188, "y": 51.4230260725476}}, {"data": {"id": "jacques_derrida", "label": "Jacques Derrida", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Jacques Derrida was a French-Algerian philosopher who founded deconstruction, a method of critical analysis that exposes the internal contradictions and assumptions within texts and philosophical traditions. His landmark work 'Of Grammatology' challenged the privileging of speech over writing in Western thought, a bias he termed 'logocentrism.' Derrida profoundly influenced literary theory, cultural studies, and continental philosophy.", "born": 1930, "died": 2004, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 18, "show_label": true}, "position": {"x": 223.3594290634652, "y": -28.470919276303242}}, {"data": {"id": "john_searle", "label": "John Searle", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "John Searle (born 1932) is an American philosopher of language and mind, best kno
