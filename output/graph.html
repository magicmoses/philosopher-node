wn for his development of speech act theory and his Chinese Room argument against strong artificial intelligence. He extended J.L. Austin's work on illocutionary acts and developed a theory of intentionality grounded in biological naturalism. Searle has been a central and often controversial figure in analytic philosophy of mind and language.", "born": 1932, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 18, "show_label": true}, "position": {"x": -116.9348004539811, "y": -280.0}}, {"data": {"id": "j_rgen_habermas", "label": "Jürgen Habermas", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Jürgen Habermas (born 1929) is a German philosopher and sociologist associated with the Frankfurt School and the theory of communicative rationality. His 'Theory of Communicative Action' argues that rationality is embedded in language and communication, and that modernity's pathologies arise from the colonization of the 'lifeworld' by systemic imperatives. He is the leading contemporary defender of Enlightenment rationality and deliberative democracy.", "born": 1929, "died": null, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 18, "show_label": true}, "position": {"x": 140.1957306788947, "y": -53.69084768752989}}, {"data": {"id": "daniel_dennett", "label": "Daniel Dennett", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Daniel Dennett (born 1942) is an American philosopher of mind and cognitive scientist known for his functionalist and materialist approach to consciousness. He argues that consciousness is a product of the brain's computational processes and has no mysterious 'hard problem,' defending what he calls 'heterophenomenology' and the 'intentional stance.' His work on evolution, free will, and religion has made him a prominent public intellectual and one of the foremost philosophers of mind of his era.", "born": 1942, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 19, "show_label": true}, "position": {"x": 202.75490536815084, "y": 284.95599894518443}}, {"data": {"id": "theodor_adorno", "label": "Theodor Adorno", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Theodor Adorno (1903–1969) was a German philosopher, sociologist, and musicologist associated with the Frankfurt School and Critical Theory. His work critically examined the culture industry, the Enlightenment's dialectical relationship with domination, and the possibilities and limits of modern art. Adorno's Negative Dialectics and Aesthetic Theory remain landmark texts in 20th-century philosophy and cultural criticism.", "born": 1903, "died": 1969, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 19, "show_label": true}, "position": {"x": 356.4987425569765, "y": -118.3954768629174}}, {"data": {"id": "anselm_of_canterbury", "label": "Canterbury", "type": "Philosopher", "era": "Medieval", "tradition": "Western", "abstract": "Anselm of Canterbury (1033–1109) was a Benedictine monk, theologian, and Archbishop of Canterbury who is often called the founder of scholasticism. He is most famous for formulating the ontological argument for the existence of God in the 'Proslogion', defining God as 'that than which nothing greater can be conceived'. His method of faith seeking understanding ('fides quaerens intellectum') set the agenda for medieval theology and philosophy.", "born": 1033, "died": 1109, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#a0522d", "degree": 20, "show_label": true}, "position": {"x": -220.10029144229154, "y": 120.08777784080081}}, {"data": {"id": "baruch_spinoza", "label": "Baruch Spinoza", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Baruch Spinoza (1632–1677) was a Dutch philosopher of Sephardic Jewish origin who is one of the great rationalists of early modern philosophy. In his 'Ethics,' presented geometrically, he argued that God and Nature are identical (pantheism/panentheism), that all things follow necessarily from divine substance, and that human freedom consists in understanding this necessity. His radical naturalism and democratic political philosophy were enormously influential on the Enlightenment and subsequent philosophy.", "born": 1632, "died": 1677, "community_id": "c5", "community_label": "Early Modern Rationalism", "color": "#ffd166", "era_color": "#1a6b8a", "degree": 20, "show_label": true}, "position": {"x": -223.91142208208313, "y": -86.52475842498524}}, {"data": {"id": "charles_sanders_peirce", "label": "Peirce", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Charles Sanders Peirce (1839–1914) was an American philosopher, logician, and scientist widely regarded as the founder of pragmatism and semiotics. He argued that the meaning of any concept consists in its conceivable practical effects, and developed a rich theory of signs distinguishing icons, indices, and symbols. His contributions to logic, the philosophy of science, and the theory of inquiry have had lasting influence on American philosophy and beyond.", "born": 1839, "died": 1914, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#2e7d32", "degree": 20, "show_label": true}, "position": {"x": 316.2217604425032, "y": 116.88539260023842}}, {"data": {"id": "jeremy_bentham", "label": "Jeremy Bentham", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Jeremy Bentham was a British philosopher and legal reformer who founded utilitarianism, the ethical theory that the right action is that which maximizes overall happiness or pleasure. He developed the 'felicific calculus' as a method for quantifying pleasure and pain, and advocated for sweeping legal and social reforms based on utilitarian principles. Bentham's work laid the foundation for consequentialist ethics and had lasting influence on liberal political thought.", "born": 1748, "died": 1832, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 20, "show_label": true}, "position": {"x": 39.57234403964945, "y": -216.92736500423084}}, {"data": {"id": "richard_rorty", "label": "Richard Rorty", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Richard Rorty (1931–2007) was an American philosopher who challenged the foundationalist tradition in epistemology, arguing that philosophy should abandon its aspiration to mirror nature and instead serve as a form of cultural criticism. Drawing on pragmatism and Wittgenstein, he advocated for a 'neo-pragmatist' approach that replaces the quest for objective truth with a focus on social solidarity and conversational justification. His work reshaped debates about the relationship between philosophy, literature, and democratic culture.", "born": 1931, "died": 2007, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 20, "show_label": true}, "position": {"x": 258.4555305432407, "y": -28.096282929897882}}, {"data": {"id": "william_james", "label": "William James", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "William James (1842–1910) was an American philosopher and psychologist who is considered the father of American psychology and a founding figure of pragmatism. He argued that the truth of ideas is determined by their practical consequences and that beliefs are tools for navigating experience rather than mirrors of a fixed reality. His works bridged philosophy, psychology, and religion, making him one of the most influential thinkers in American intellectual history.", "born": 1842, "died": 1910, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#2e7d32", "degree": 21, "show_label": true}, "position": {"x": 335.7557950914653, "y": 67.0629873886018}}, {"data": {"id": "jean_jacques_rousseau", "label": "Rousseau", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Jean-Jacques Rousseau was a Genevan philosopher and political theorist of the Enlightenment whose ideas profoundly influenced modern political thought, education, and Romanticism. He argued that human beings are naturally good but corrupted by society, and in 'The Social Contract' he developed the concept of popular sovereignty based on the general will. His educational philosophy in 'Emile' emphasized natural development over rote instruction.", "born": 1712, "died": 1778, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#1a6b8a", "degree": 22, "show_label": true}, "position": {"x": 172.90826839061242, "y": 2.9799642795538404}}, {"data": {"id": "rudolf_carnap", "label": "Rudolf Carnap", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Rudolf Carnap (1891–1970) was a leading figure of the Vienna Circle and logical positivism, whose work sought to apply formal logic to the problems of philosophy and science. He developed influential theories of meaning, analyticity, and logical syntax, and later turned to modal logic and inductive probability. His distinction between internal and external questions of ontology remains a touchstone in metaontology and philosophy of language.", "born": 1891, "died": 1970, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 22, "show_label": true}, "position": {"x": 27.3615939534134, "y": -346.0567312104762}}, {"data": {"id": "thomas_hobbes", "label": "Thomas Hobbes", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Thomas Hobbes (1588–1679) was an English philosopher best known for his political philosophy, especially his argument in Leviathan that a strong sovereign authority is necessary to avoid the 'war of all against all' in the state of nature. He was one of the founders of modern political philosophy and social contract theory, offering a materialist account of mind, language, and society. Hobbes's work deeply influenced subsequent political thought from liberalism to authoritarianism.", "born": 1588, "died": 1679, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 22, "show_label": true}, "position": {"x": 257.129979853945, "y": -291.62305100254116}}, {"data": {"id": "augustine_of_hippo", "label": "Augustine of Hippo", "type": "Philosopher", "era": "Medieval", "tradition": "Western", "abstract": "Augustine of Hippo (354–430 CE) was a North African bishop and theologian whose works synthesized Neoplatonic philosophy with Christian doctrine, shaping the trajectory of Western Christianity and medieval philosophy. In 'Confessions' he developed a searching autobiographical examination of sin, grace, and conversion, while 'The City of God' offered a Christian philosophy of history. His doctrines of original sin, divine grace, and the will remain foundational to Catholic and Protestant theology.", "born": 354, "died": 430, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#a0522d", "degree": 23, "show_label": true}, "position": {"x": -288.50330023012805, "y": 154.8723406890241}}, {"data": {"id": "edmund_husserl", "label": "Edmund Husserl", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Edmund Husserl (1859–1938) was a German philosopher and mathematician who founded the philosophical movement of phenomenology. His method of bracketing natural assumptions (epoché) to focus on the structures of consciousness and intentionality transformed philosophy, psychology, and the humanities. Husserl's work established phenomenology as one of the major philosophical traditions of the twentieth century.", "born": 1859, "died": 1938, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 23, "show_label": true}, "position": {"x": 330.8554464228248, "y": -50.45958985431683}}, {"data": {"id": "ren_descartes", "label": "René Descartes", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "René Descartes (1596–1650) was a French philosopher, mathematician, and scientist widely regarded as the father of modern philosophy. He employed systematic doubt to strip away uncertain beliefs, arriving at the foundational certainty of 'cogito, ergo sum' (I think, therefore I am), and from there reconstructed knowledge on a rationalist basis. His mind-body dualism and method of radical doubt set the agenda for much of subsequent Western philosophy and epistemology.", "born": 1596, "died": 1650, "community_id": "c5", "community_label": "Early Modern Rationalism", "color": "#ffd166", "era_color": "#1a6b8a", "degree": 23, "show_label": true}, "position": {"x": -223.9704255698012, "y": -139.59913003775785}}, {"data": {"id": "jean_paul_sartre", "label": "Jean-Paul Sartre", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Jean-Paul Sartre was a French existentialist philosopher, playwright, and novelist who argued that 'existence precedes essence,' meaning humans are radically free and entirely responsible for creating their own values and identities. His major philosophical work 'Being and Nothingness' developed a phenomenological ontology distinguishing being-in-itself from being-for-itself. Sartre was a towering figure in 20th-century thought, integrating existentialism with Marxism in his later work.", "born": 1905, "died": 1980, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 25, "show_label": true}, "position": {"x": 190.38329303040808, "y": -35.21684227853655}}, {"data": {"id": "john_dewey", "label": "John Dewey", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "John Dewey was an American philosopher, psychologist, and educational reformer who was the leading figure of pragmatism in the 20th century. He argued that inquiry is a tool for solving practical problems and that education should be grounded in experience and oriented toward democracy and growth. His influence extended across philosophy, education, psychology, and social theory, making him one of the most impactful American thinkers.", "born": 1859, "died": 1952, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#2e7d32", "degree": 25, "show_label": true}, "position": {"x": 201.82719081615966, "y": 177.85600520871526}}, {"data": {"id": "gottlob_frege", "label": "Gottlob Frege", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Gottlob Frege (1848–1925) was a German philosopher and mathematician who is widely regarded as the founder of modern logic and analytic philosophy. His Begriffsschrift introduced predicate logic, and his distinction between sense (Sinn) and reference (Bedeutung) became a cornerstone of philosophy of language. Frege's logicist project sought to ground arithmetic in purely logical foundations, profoundly influencing Russell, Wittgenstein, and the entire analytic tradition.", "born": 1848, "died": 1925, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#2e7d32", "degree": 26, "show_label": true}, "position": {"x": -34.91408779947131, "y": -149.6988504324524}}, {"data": {"id": "thomas_aquinas", "label": "Thomas Aquinas", "type": "Philosopher", "era": "Medieval", "tradition": "Western", "abstract": "Thomas Aquinas (1225–1274) was an Italian Dominican friar and philosopher who synthesized Aristotelian philosophy with Christian theology, producing one of the most comprehensive philosophical systems of the medieval period. His Summa Theologica addresses questions of God, natural law, ethics, and metaphysics with extraordinary systematic rigor. Aquinas's thought, known as Thomism, remains the official philosophical framework of the Roman Catholic Church.", "born": 1225, "died": 1274, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#a0522d", "degree": 30, "show_label": true}, "position": {"x": -251.17359113192697, "y": 39.98330954994936}}, {"data": {"id": "friedrich_nietzsche", "label": "Nietzsche", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Friedrich Nietzsche (1844–1900) was a German philosopher whose radical critiques of morality, religion, and metaphysics profoundly shaped modern and contemporary thought. He introduced influential ideas such as the will to power, eternal recurrence, and the Übermensch as alternatives to the nihilism he diagnosed in Western culture. Nietzsche's perspectivism and genealogical method of critique influenced existentialism, poststructuralism, and much of twentieth-century philosophy.", "born": 1844, "died": 1900, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 31, "show_label": true}, "position": {"x": 302.3257246657478, "y": -28.008482322051385}}, {"data": {"id": "john_stuart_mill", "label": "John Stuart Mill", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "John Stuart Mill (1806–1873) was a British philosopher and political economist who made foundational contributions to utilitarianism, liberal political theory, and logic. His 'On Liberty' articulated the harm principle as the limit of legitimate state interference, while 'The Subjection of Women' was a pioneering feminist argument for gender equality. Mill's refinement of utilitarian theory and his empiricist logic made him one of the most influential thinkers of the 19th century.", "born": 1806, "died": 1873, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#2e7d32", "degree": 31, "show_label": true}, "position": {"x": 44.3104306679476, "y": -274.9976975849492}}, {"data": {"id": "plato", "label": "Plato", "type": "Philosopher", "era": "Ancient", "tradition": "Western", "abstract": "Plato (c. 428–348 BCE) was an ancient Greek philosopher, student of Socrates and teacher of Aristotle, who founded the Academy in Athens. He developed the theory of Forms, arguing that the material world is a shadow of an eternal realm of perfect, abstract entities, and that knowledge is the recollection of these Forms. His dialogues remain foundational texts of Western philosophy, covering epistemology, metaphysics, ethics, politics, and aesthetics.", "born": -428, "died": -348, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#c9a227", "degree": 31, "show_label": true}, "position": {"x": -305.4512849985573, "y": 58.076651214662235}}, {"data": {"id": "karl_popper", "label": "Karl Popper", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Karl Popper (1902–1994) was an Austrian-British philosopher of science and political philosophy who introduced the criterion of falsifiability as the demarcation between science and non-science. His 'Logic of Scientific Discovery' replaced inductivism with a hypothetico-deductive model in which scientific theories are conjectures subject to rigorous testing and potential refutation. In political philosophy, 'The Open Society and Its Enemies' mounted an influential defense of liberal democracy against totalitarianism.", "born": 1902, "died": 1994, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 32, "show_label": true}, "position": {"x": 214.45305709495858, "y": 109.04325010282462}}, {"data": {"id": "john_locke", "label": "John Locke", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "John Locke (1632–1704) was an English philosopher whose work laid the foundations for modern liberalism and empiricist epistemology. In political philosophy, he argued for natural rights to life, liberty, and property, and the social contract as the basis of legitimate government. His empiricist theory of mind and knowledge profoundly shaped Enlightenment thought and later philosophy.", "born": 1632, "died": 1704, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 35, "show_label": true}, "position": {"x": 89.22948405358393, "y": -232.30974853038074}}, {"data": {"id": "martin_heidegger", "label": "Martin Heidegger", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Martin Heidegger (1889–1976) was a German philosopher whose magnum opus 'Being and Time' (1927) fundamentally reoriented twentieth-century philosophy by asking anew the question of the meaning of Being. He introduced concepts such as Dasein, thrownness, and authenticity to analyze human existence as always already embedded in a world of practical concern and temporal finitude. Despite his controversial political involvement with National Socialism, his influence on existentialism, hermeneutics, deconstruction, and continental philosophy remains immense.", "born": 1889, "died": 1976, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 36, "show_label": true}, "position": {"x": 209.427094193339, "y": -124.96131152431448}}, {"data": {"id": "karl_marx", "label": "Karl Marx", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Karl Marx (1818–1883) was a German philosopher, economist, and revolutionary whose materialist analysis of history and capitalism transformed political thought globally. His concept of historical materialism holds that the material conditions of production determine social and ideological structures, while his critique of capitalism in 'Das Kapital' analyzes exploitation, alienation, and class struggle. Marx's thought founded the tradition of Marxism and shaped 20th-century politics, economics, and social theory.", "born": 1818, "died": 1883, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 40, "show_label": true}, "position": {"x": 151.22896890654113, "y": -96.31839116956354}}, {"data": {"id": "john_rawls", "label": "John Rawls", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "John Rawls (1921–2002) was an American political philosopher whose 'A Theory of Justice' is one of the most influential works in 20th-century political philosophy. He developed the concept of 'justice as fairness,' grounded in the original position and veil of ignorance thought experiment, yielding principles of equal basic liberties and the difference principle. Rawls revived liberal political philosophy and set the agenda for contemporary debates in political theory.", "born": 1921, "died": 2002, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 41, "show_label": true}, "position": {"x": 58.586400826647775, "y": -251.32818609443052}}, {"data": {"id": "hilary_putnam", "label": "Hilary Putnam", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Hilary Putnam was an American philosopher of exceptional breadth who made major contributions to philosophy of mind, language, mathematics, and science. He is renowned for his semantic externalism—captured in the slogan 'meanings just ain't in the head'—his twin earth thought experiment, and his arguments about the indispensability of mathematics. Over his career he moved through scientific realism, internal realism, and pragmatism, making him one of the most philosophically restless and influential thinkers of the twentieth century.", "born": 1926, "died": 2016, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 44, "show_label": true}, "position": {"x": -100.7343570493735, "y": -202.70380921930703}}, {"data": {"id": "bertrand_russell", "label": "Bertrand Russell", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Bertrand Russell (1872–1970) was a British philosopher, logician, and public intellectual who made foundational contributions to mathematical logic, epistemology, and analytic philosophy. Together with Alfred North Whitehead he wrote 'Principia Mathematica,' attempting to ground mathematics in logic, and his theory of descriptions revolutionized the philosophy of language. He was also a prominent social activist and one of the founders of the analytic tradition.", "born": 1872, "died": 1970, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#2e7d32", "degree": 45, "show_label": true}, "position": {"x": 89.41745979417347, "y": -211.3875699034071}}, {"data": {"id": "ludwig_wittgenstein", "label": "Wittgenstein", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Ludwig Wittgenstein was an Austrian-British philosopher who produced two profoundly influential but divergent philosophical visions: the early Tractatus Logico-Philosophicus, which held that language pictures logical facts and that much of philosophy results from misuse of language, and the later Philosophical Investigations, which rejected that picture theory in favor of a view of meaning as use within forms of life. He introduced the concepts of language games and family resemblance to dissolve traditional philosophical problems rather than solve them. Wittgenstein is widely regarded as one of the most important philosophers of the twentieth century, transforming both analytic and continental approaches to language, mind, and philosophy itself.", "born": 1889, "died": 1951, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 46, "show_label": true}, "position": {"x": -114.00726123757117, "y": -367.48084837315594}}, {"data": {"id": "david_hume", "label": "David Hume", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "David Hume (1711–1776) was a Scottish Enlightenment philosopher, historian, and essayist who is one of the most important figures in the Western philosophical tradition. He developed a rigorous empiricism and skepticism, arguing that human knowledge derives from sensory impressions and that reason is the 'slave of the passions.' His work on causation, personal identity, religion, and morality profoundly influenced Kant, the logical positivists, and modern philosophy broadly.", "born": 1711, "died": 1776, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 49, "show_label": true}, "position": {"x": 206.52167339398957, "y": -149.39505579352175}}, {"data": {"id": "georg_wilhelm_friedrich_hegel", "label": "Hegel", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Georg Wilhelm Friedrich Hegel (1770–1831) was a German philosopher and the central figure of German Idealism, whose system of dialectical philosophy attempted to comprehend all of reality as the self-development of Absolute Spirit or Geist. His Phenomenology of Spirit traces the journey of consciousness toward absolute knowing through stages of contradiction and synthesis, while his Philosophy of Right provided a foundational account of ethics, civil society, and the state. Hegel's dialectical method and his historicist approach to philosophy profoundly influenced Marx, existentialism, critical theory, and much of continental philosophy.", "born": 1770, "died": 1831, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 49, "show_label": true}, "position": {"x": 288.5049529894542, "y": 16.525958650936445}}, {"data": {"id": "aristotle", "label": "Aristotle", "type": "Philosopher", "era": "Ancient", "tradition": "Western", "abstract": "Aristotle (384–322 BCE) was an ancient Greek philosopher and polymath, student of Plato and tutor to Alexander the Great, who systematized logic, natural science, metaphysics, and ethics. His core contributions include the doctrine of the four causes, the concept of substance, and virtue ethics centered on eudaimonia (flourishing). He is one of the most influential thinkers in the history of Western and Islamic philosophy.", "born": -384, "died": -322, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#c9a227", "degree": 51, "show_label": true}, "position": {"x": -251.03762699518722, "y": 133.48466188531128}}, {"data": {"id": "willard_van_orman_quine", "label": "Quine", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Willard van Orman Quine (1908–2000) was an American philosopher and logician, one of the most influential analytic philosophers of the 20th century. He challenged the analytic-synthetic distinction and the notion of meaning as foundational to philosophy, arguing instead for a naturalized epistemology in which philosophy is continuous with empirical science. His work on ontology, logic, and language fundamentally reshaped analytic philosophy.", "born": 1908, "died": 2000, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 57, "show_label": true}, "position": {"x": 149.71950907332047, "y": -299.7109473070614}}, {"data": {"id": "immanuel_kant", "label": "Immanuel Kant", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Immanuel Kant was an eighteenth-century German philosopher who effected a 'Copernican revolution' in philosophy by arguing that the mind actively structures experience through a priori categories and forms of intuition. In ethics, he developed the deontological theory of the categorical imperative, grounding morality in pure practical reason rather than consequences or sentiment. Kant's synthesis of rationalism and empiricism, his critical epistemology, and his moral philosophy remain foundational to virtually every branch of contemporary Western philosophy.", "born": 1724, "died": 1804, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#1a6b8a", "degree": 85, "show_label": true}, "position": {"x": 90.98417851116729, "y": -165.83083797781433}}, {"data": {"id": "e2256", "source": "bernard_williams", "target": "a_j_ayer", "relation": "built_on", "color": "#4a9eff", "intra": false}}, {"data": {"id": "e2257", "source": "michael_dummett", "target": "a_j_ayer", "relation": "built_on", "color": "#4a9eff", "intra": true}}, {"data": {"id": "e2258", "source": "p_f_strawson", "target": "a_j_ayer", "relation": "critiqued", "color": "#ffa500", "intra": true}}, {"data": {"id": "e2259", "source": "karl_marx", "target": "adam_smith", "relation": "critiqued", "color": "#ffa500", "intra": false let cy;

// ── Cytoscape init ───────────────────────────────────────────────────────────
function initCy() {
  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: ELEMENTS,

    style: [
      // Philosopher nodes
      {
        selector: 'node[type = "Philosopher"]',
        style: {
          'background-color':   'data(color)',
          'width':              e => nodeSize(e.data('degree')),
          'height':             e => nodeSize(e.data('degree')),
          'border-width':       0,
          'label':              'data(label)',
          'font-size':               6,
          'color':                   '#c9d1d9',
          'text-valign':             'bottom',
          'text-margin-y':           5,
          'text-wrap':               'none',
          // Permanent label for well-known nodes; opaque background prevents overlap
          'text-opacity':            e => e.data('show_label') ? 0.9 : 0,
          'text-background-color':   '#0d1117',
          'text-background-opacity': e => e.data('show_label') ? 0.95 : 0,
          'text-background-padding': '2px',
          'min-zoomed-font-size':    5,
          // Higher-degree nodes paint on top → their labels win overlap battles
          'z-index':                 e => e.data('degree'),
          'transition-property': 'opacity, border-width, border-color',
          'transition-duration': '0.12s',
        }
      },

      // Ghost layer — always visible, very faint grey, no arrows
      // Gives the "connected network" feeling without clutter
      {
        selector: 'edge',
        style: {
          'line-color':          '#2a2d3a',
          'target-arrow-shape':  'none',
          'curve-style':         'bezier',
          'opacity':             0.55,
          'width':               0.5,
          'transition-property': 'opacity, width, line-color, target-arrow-color',
          'transition-duration': '0.15s',
        }
      },
      // contemporary_of — even fainter (purely temporal)
      {
        selector: 'edge[relation = "contemporary_of"]',
        style: { 'opacity': 0.18, 'width': 0.4 }
      },
      // Ambient: preset active — colour restored, arrows appear
      {
        selector: 'edge.ambient',
        style: {
          'line-color':         'data(color)',
          'target-arrow-color': 'data(color)',
          'target-arrow-shape': 'triangle',
          'arrow-scale':        0.6,
          'opacity': e => {
            const r = e.data('relation');
            if (r === 'student_of' || r === 'refuted') return 0.65;
            if (r === 'critiqued')         return 0.45;
            if (r === 'collaborated_with') return 0.55;
            return 0.25;
          },
          'width': e => e.data('relation') === 'built_on' ? 1.0 : 1.5,
        }
      },
      // Hover edge — bright, full colour
      {
        selector: 'edge.hover-edge',
        style: {
          'line-color':         'data(color)',
          'target-arrow-color': 'data(color)',
          'target-arrow-shape': 'triangle',
          'arrow-scale':        0.7,
          'opacity':            0.85,
          'width':              1.8,
        }
      },

      // Neighbour label — shown when a connected node is selected/highlighted
      {
        selector: 'node.neighbor-label',
        style: {
          'text-opacity':            1,
          'text-background-color':   '#0d1117',
          'text-background-opacity': 0.92,
          'text-background-padding': '2px',
          'font-size':               6,
          'color':                   '#c9d1d9',
          'z-index':                 500,
        }
      },
      // Hover — always show label, pop to top z-index so it never hides under others
      {
        selector: 'node.hovered',
        style: {
          'border-width':            2,
          'border-color':            '#ffffff88',
          'text-opacity':            1,
          'text-background-color':   '#0d1117',
          'text-background-opacity': 0.92,
          'text-background-padding': '3px',
          'font-size':               8,
          'color':                   '#ffffff',
          'z-index':                 9999,
        }
      },

      // Selection highlight
      {
        selector: 'node.selected',
        style: {
          'border-width':            2.5,
          'border-color':            '#ffffff',
          'text-opacity':            1,
          'text-background-color':   '#0d1117',
          'text-background-opacity': 0.92,
          'text-background-padding': '3px',
          'font-size':               9,
          'color':                   '#ffffff',
          'z-index':                 9999,
        }
      },
      {
        selector: 'edge.highlighted',
        style: { 'opacity': 1.0, 'width': 2.2 }
      },
      {
        selector: '.dimmed',
        style: { 'opacity': 0.05 }
      },
    ],

    layout: {
      name:    'preset',
      animate: false,
    },

    wheelSensitivity: 0.3,
  });

  // Refine from sector seeds with cose.
  // High gravity keeps everything concentrated; differential idealEdgeLength
  // pulls intra-cluster nodes tight while letting inter-cluster edges breathe.
  cy.ready(() => {
    cy.layout({
      name:             'cose',
      animate:          true,
      animationDuration: 1000,
      fit:              true,
      padding:          60,
      randomize:        false,       // start from sector seeds
      nodeRepulsion:    7000,        // moderate — less spreading
      idealEdgeLength:  e => e.data('intra') ? 40 : 160,
      edgeElasticity:   e => e.data('intra') ? 0.6 : 0.15,
      nestingFactor:    0.1,
      gravity:          0.75,        // high gravity = compact, no pyramid
      numIter:          1500,
      initialTemp:      80,          // don't stray far from seeds
      coolingFactor:    0.99,
      minTemp:          1.0,
    }).on('layoutstop', () => {
      removeOverlaps(cy);
      initSearch();
    }).run();
  });

  // Events
  // Single tap → highlight connections, label neighbours, open info card
  cy.on('tap', 'node[type = "Philosopher"]', e => selectNode(e.target));
  // Tap on empty background → clear everything
  cy.on('tap', e => { if (e.target === cy) deselect(); });
  cy.on('mouseover', 'node[type = "Philosopher"]', e => {
    const node = e.target;
    node.addClass('hovered');
    // Show this node's edges on hover (only active types)
    node.connectedEdges().forEach(edge => {
      if (activeEdgeTypes.has(edge.data('relation')) || activeEdgeTypes.size === 0) {
        edge.addClass('hover-edge');
      }
    });
    showTooltip(e);
  });
  cy.on('mouseout', 'node[type = "Philosopher"]', e => {
    const node = e.target;
    node.removeClass('hovered');
    // Only remove hover-edge if not also highlighted (from selection)
    node.connectedEdges().not('.highlighted').removeClass('hover-edge');
    hideTooltip();
  });
}

function nodeSize(deg) {
  return Math.max(5, Math.min(12, 5 + deg * 0.45));
}

// ── Selection & sidebar ───────────────────────────────────────────────────────
function highlightNode(node) {
  if (selected) selected.removeClass('selected');
  // Clear previous neighbour labels
  cy.nodes().removeClass('neighbor-label');

  selected = node;
  node.addClass('selected');
  cy.elements().addClass('dimmed').removeClass('highlighted');
  node.removeClass('dimmed');

  const hood = node.closedNeighborhood();
  hood.removeClass('dimmed');
  hood.edges().addClass('highlighted').removeClass('dimmed');

  // Label all connected nodes for this view
  hood.nodes().forEach(n => {
    if (n.id() !== node.id()) n.addClass('neighbor-label');
  });
}

function selectNode(node) {
  highlightNode(node);
  renderSidebar(node.data());
}

function deselect() {
  if (selected) selected.removeClass('selected');
  selected = null;
  cy.elements().removeClass('dimmed highlighted');
  cy.edges().removeClass('hover-edge');
  cy.nodes().removeClass('neighbor-label');
  document.getElementById('info-card').classList.remove('open');
}

function renderSidebar(d) {
  const card  = document.getElementById('info-card');
  const extra = SIDEBAR[d.id] || {};
  const eraColor = ERA_COLORS[d.era] || '#555';
  const dash  = '—';
  const dates = (d.born || d.died)
    ? '(' + (d.born || '?') + ' – ' + (d.died || 'present') + ')'
    : '';

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function tagRow(items) {
    if (!items || !items.length) return '<span class="no-data">' + dash + '</span>';
    return '<div class="tag-row">' +
      items.map(s => '<span class="tag">' + esc(s) + '</span>').join('') +
      '</div>';
  }

  function workRows(items) {
    if (!items || !items.length) return '<span class="no-data">' + dash + '</span>';
    return '<ul class="work-list">' +
      items.map(w => '<li>' + esc(w) + '</li>').join('') +
      '</ul>';
  }

  function linkRow(items) {
    if (!items || !items.length) return '<span class="no-data">' + dash + '</span>';
    return '<div class="tag-row">' +
      items.map(s => '<span class="tag link" data-jump="' + esc(s) + '">' + esc(s) + '</span>').join('') +
      '</div>';
  }

  const node    = cy.getElementById(d.id);
  // After edge reversal: outgoers = philosophers this one built on (sources)
  //                      incomers = philosophers who built on this one
  const outNbrs = node.outgoers('node[type="Philosopher"]').map(n => n.data('label'));
  const inNbrs  = node.incomers('node[type="Philosopher"]').map(n => n.data('label'));

  card.innerHTML =
    '<div class="s-name">' + esc(d.label) + '</div>' +
    '<div class="s-dates">' + dates + '</div>' +
    '<span class="s-era" style="background:' + eraColor + '28;color:' + eraColor + '">' + esc(d.era) + '</span>' +
    '<p class="s-abstract">' + esc(d.abstract || dash) + '</p>' +
    '<div class="s-section"><div class="s-section-title">Key Works</div>' + workRows(extra.works) + '</div>' +
    '<div class="s-section"><div class="s-section-title">Key Concepts</div>' + tagRow(extra.concepts) + '</div>' +
    '<div class="s-section"><div class="s-section-title">Movements</div>' + tagRow(extra.schools) + '</div>' +
    '<div class="s-section"><div class="s-section-title">Built on / responded to (' + outNbrs.length + ')</div>' + linkRow(outNbrs) + '</div>' +
    '<div class="s-section"><div class="s-section-title">Influenced (' + inNbrs.length + ')</div>' + linkRow(inNbrs) + '</div>';

  // Attach jump handlers via data attribute (avoids inline-onclick quote issues)
  card.querySelectorAll('[data-jump]').forEach(el => {
    el.addEventListener('click', () => jumpTo(el.getAttribute('data-jump')));
  });

  card.classList.add('open');
}

function jumpTo(label) {
  const node = cy.nodes().filter(n => n.data('label') === label).first();
  if (node.length) {
    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.5) }, { duration: 300 });
    selectNode(node);
  }
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tt = document.getElementById('tooltip');
let ttMove;
function showTooltip(e) {
  const d = e.target.data();
  tt.textContent = d.label + (d.born ? ` (${d.born})` : '');
  tt.style.display = 'block';
  document.removeEventListener('mousemove', ttMove);
  ttMove = ev => {
    tt.style.left = (ev.clientX + 14) + 'px';
    tt.style.top  = (ev.clientY - 32) + 'px';
  };
  document.addEventListener('mousemove', ttMove);
}
function hideTooltip() {
  tt.style.display = 'none';
  document.removeEventListener('mousemove', ttMove);
}

// ── Filter chips ──────────────────────────────────────────────────────────────
function buildChips() {
  const container = document.getElementById('chips');
  Object.entries(COMMUNITIES)
    .sort((a, b) => b[1].size - a[1].size)
    .forEach(([cid, c]) => {
      const chip = document.createElement('span');
      chip.className = 'chip on';
      chip.style.background    = c.color + '22';
      chip.style.color         = c.color;
      chip.style.borderColor   = c.color + '66';
      chip.textContent         = c.name;
      chip.dataset.cid         = cid;
      chip.addEventListener('click', () => filterByCommunity(cid));
      container.appendChild(chip);
    });
}

function filterByCommunity(cid) {
  if (activeCid === cid) {
    // Reset
    activeCid = null;
    document.querySelectorAll('.chip').forEach(c => c.classList.replace('off','on') || c.classList.add('on'));
    cy.nodes().style('display', 'element');
    cy.edges().style('display', 'element');
    cy.fit(60);
  } else {
    activeCid = cid;
    document.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('on',  c.dataset.cid === cid);
      c.classList.toggle('off', c.dataset.cid !== cid);
    });
    const members = new Set(COMMUNITIES[cid]?.members || []);
    cy.nodes('[type="Philosopher"]').forEach(n => {
      n.style('display', members.has(n.id()) ? 'element' : 'none');
    });
    // Edges: keep ambient if active, but only within visible cluster
    cy.edges().forEach(e => {
      const vis = members.has(e.source().id()) && members.has(e.target().id());
      if (!vis) e.removeClass('ambient hover-edge highlighted');
    });
    cy.fit(cy.nodes(':visible'), 60);
    deselect();
  }
}

// ── Community grid (L1) ───────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('community-grid');
  grid.innerHTML = '';
  Object.entries(COMMUNITIES)
    .sort((a, b) => b[1].size - a[1].size)
    .forEach(([cid, c]) => {
      const card = document.createElement('div');
      card.className = 'cluster-card';
      card.style.background   = c.color + '14';
      card.style.borderColor  = c.color + '40';
      card.innerHTML = `
        <div class="cluster-name" style="color:${c.color}">${c.name}</div>
        <div class="cluster-size" style="color:${c.color}">${c.size} thinkers</div>
        <div class="cluster-members">${c.top_names.join(' · ')}</div>
      `;
      card.addEventListener('click', () => {
        setView('l2');
        setTimeout(() => filterByCommunity(cid), 50);
      });
      grid.appendChild(card);
    });
}

// ── View switch ───────────────────────────────────────────────────────────────
function setView(v) {
  activeView = v;
  document.getElementById('tab-l1').classList.toggle('active', v === 'l1');
  document.getElementById('tab-l2').classList.toggle('active', v === 'l2');
  document.getElementById('cy').style.display            = v === 'l2' ? 'block' : 'none';
  document.getElementById('community-grid').classList.toggle('visible', v === 'l1');
  document.getElementById('filter-bar').style.display    = v === 'l2' ? 'flex'  : 'none';
  document.getElementById('legend').style.display        = v === 'l2' ? 'flex'  : 'none';
  if (v === 'l1') renderGrid();
}

// ── Edge type filters ────────────────────────────────────────────────────────
const EDGE_META = {
  student_of:        { label: 'student of',   color: '#50fa7b' },
  built_on:          { label: 'built on',     color: '#4a9eff' },
  critiqued:         { label: 'critiqued',    color: '#ffa500' },
  refuted:           { label: 'refuted',      color: '#ff5555' },
  collaborated_with: { label: 'collaborated', color: '#c77dff' },
};

// contemporary_of excluded from all presets — 1151 edges of pure temporal noise
const PRESETS = {
  none:      { types: [],                               desc: 'Click any thinker to explore their connections' },
  influences: { types: ['student_of', 'built_on'],       desc: 'Intellectual lineage — who built on whom and teacher-student bonds' },
  debates:   { types: ['critiqued', 'refuted'],          desc: 'Where thinkers clashed — critiques and explicit refutations' },
  all:       { types: ['student_of', 'built_on', 'critiqued', 'refuted', 'collaborated_with'], desc: 'All intellectual connections (no temporal edges)' },
};

let activeEdgeTypes = new Set();  // empty = Focus mode (edges on-demand only)

function buildEdgeChips() {
  const container = document.getElementById('edge-chips');
  Object.entries(EDGE_META).forEach(([rel, meta]) => {
    const chip = document.createElement('span');
    chip.className = 'chip on';
    chip.style.background  = meta.color + '22';
    chip.style.color       = meta.color;
    chip.style.borderColor = meta.color + '66';
    chip.textContent       = meta.label;
    chip.dataset.rel       = rel;
    chip.addEventListener('click', () => toggleEdgeType(rel));
    container.appendChild(chip);
  });
}

function toggleEdgeType(rel) {
  if (activeEdgeTypes.has(rel)) {
    activeEdgeTypes.delete(rel);
  } else {
    activeEdgeTypes.add(rel);
  }
  applyEdgeVisibility();
  syncEdgeChips();
  // Clear preset highlight when manually toggling
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

function applyEdgeVisibility() {
  cy.edges().forEach(e => {
    const rel = e.data('relation');
    const active = activeEdgeTypes.has(rel);
    // Always keep in DOM (display:element) — opacity does the hiding
    e.style('display', 'element');
    e.toggleClass('ambient', active && activeEdgeTypes.size > 0);
  });
}

function syncEdgeChips() {
  document.querySelectorAll('#edge-chips .chip').forEach(c => {
    c.classList.toggle('on',  activeEdgeTypes.has(c.dataset.rel));
    c.classList.toggle('off', !activeEdgeTypes.has(c.dataset.rel));
  });
}

function setPreset(name) {
  const preset = PRESETS[name] || PRESETS.all;
  activeEdgeTypes = new Set(preset.types);
  applyEdgeVisibility();
  syncEdgeChips();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('preset-' + name)?.classList.add('active');
  document.getElementById('preset-desc').textContent = preset.desc;
}

// ── Search ────────────────────────────────────────────────────────────────────
function initSearch() {
  const input    = document.getElementById('search-input');
  const dropdown = document.getElementById('search-dropdown');

  // Build lookup: lowercase name → node data
  const index = [];
  cy.nodes('[type = "Philosopher"]').forEach(n => {
    index.push({ id: n.id(), label: n.data('label'), era: n.data('era') });
  });
  index.sort((a, b) => a.label.localeCompare(b.label));

  function showResults(query) {
    const q = query.toLowerCase().trim();
    if (!q) { dropdown.style.display = 'none'; return; }

    const matches = index
      .filter(p => p.label.toLowerCase().includes(q))
      .slice(0, 8);

    if (!matches.length) { dropdown.style.display = 'none'; return; }

    dropdown.innerHTML = matches.map(p => `
      <div class="search-item" data-id="${p.id}">
        <span class="search-item-name">${p.label}</span>
        <span class="search-item-era">${p.era}</span>
      </div>`).join('');

    dropdown.querySelectorAll('.search-item').forEach(item => {
      item.addEventListener('click', () => {
        const node = cy.getElementById(item.dataset.id);
        if (node.length) {
          // Switch to graph view if needed
          if (activeView !== 'l2') setView('l2');
          setTimeout(() => {
            cy.animate({ center: { eles: node }, zoom: 2.2 }, { duration: 400 });
            selectNode(node);
          }, activeView !== 'l2' ? 100 : 0);
        }
        input.value = item.querySelector('.search-item-name').textContent;
        dropdown.style.display = 'none';
      });
    });

    dropdown.style.display = 'block';
  }

  input.addEventListener('input', e => showResults(e.target.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { dropdown.style.display = 'none'; input.blur(); }
    if (e.key === 'Enter') {
      const first = dropdown.querySelector('.search-item');
      if (first) first.click();
    }
  });

  // Close on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('#search-wrap')) dropdown.style.display = 'none';
  });
}

// ── Overlap removal ───────────────────────────────────────────────────────────
// Bidirectional push — no temporal Y constraint since we use cluster layout.
// PAD is generous enough to leave breathing room for labels below nodes.
function removeOverlaps(cy) {
  const PAD   = 18;  // extra space for labels below nodes
  const nodes = cy.nodes('[type = "Philosopher"]:visible');

  for (let iter = 0; iter < 100; iter++) {
    let moved = false;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const ap = a.position(), bp = b.position();
        const dx = bp.x - ap.x;
        const dy = bp.y - ap.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const minDist = (a.width() + b.width()) / 2 + PAD;

        if (dist < minDist) {
          const push = (minDist - dist) / 2 + 0.5;
          const nx = (dx / dist) * push;
          const ny = (dy / dist) * push;
          a.position({ x: ap.x - nx, y: ap.y - ny });
          b.position({ x: bp.x + nx, y: bp.y + ny });
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initCy();
  buildChips();
  buildEdgeChips();
});
</script>
