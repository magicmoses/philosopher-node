<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophy Knowledge Graph</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}

.header-title { font-size: 14px; font-weight: 600; white-space: nowrap; }

.view-tabs {
  display: flex;
  gap: 2px;
  background: #0d1117;
  border-radius: 6px;
  padding: 3px;
}
.tab {
  padding: 4px 14px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: #8b949e;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab.active { background: #21262d; color: #e6edf3; }
.tab:hover:not(.active) { color: #c9d1d9; }

.header-stats { font-size: 11px; color: #8b949e; margin-left: auto; white-space: nowrap; }

/* ── Cluster filter bar ─────────────────────────────────────── */
#filter-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
  flex-wrap: wrap;
  min-height: 38px;
}
.filter-label { font-size: 10px; color: #8b949e; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
.chip {
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: opacity 0.15s, transform 0.1s;
  white-space: nowrap;
  font-weight: 500;
}
.chip.on  { opacity: 1; }
.chip.off { opacity: 0.3; }
.chip:hover { opacity: 0.85; transform: translateY(-1px); }

/* ── Main content ────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; position: relative; }

#cy { flex: 1; background: #0d1117; }

/* ── Community grid (L1) ─────────────────────────────────────── */
#community-grid {
  display: none;
  flex: 1;
  padding: 24px 32px;
  overflow-y: auto;
  flex-wrap: wrap;
  gap: 14px;
  align-content: flex-start;
  justify-content: center;
}
#community-grid.visible { display: flex; }

.cluster-card {
  flex: 0 1 260px;
  padding: 18px 20px;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: transform 0.15s, box-shadow 0.2s;
}
.cluster-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 32px rgba(0,0,0,0.5);
}
.cluster-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.cluster-size { font-size: 11px; opacity: 0.65; margin-bottom: 10px; }
.cluster-members { font-size: 11px; opacity: 0.75; line-height: 1.6; }

/* ── Info card (fixed overlay, no layout dependency) ─────────── */
#info-card {
  display: none;
  position: fixed;
  top: 96px;
  right: 20px;
  width: 290px;
  max-height: calc(100vh - 130px);
  overflow-y: auto;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 18px 20px;
  z-index: 300;
  box-shadow: 0 8px 32px rgba(0,0,0,0.55);
}
#info-card.open { display: block; }

.s-name  { font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
.s-dates { font-size: 11px; color: #8b949e; margin-bottom: 10px; }
.s-era   {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}
.s-abstract { font-size: 12px; color: #c9d1d9; line-height: 1.65; margin-bottom: 14px; }
.s-section { margin-bottom: 12px; }
.s-section-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #8b949e;
  margin-bottom: 5px;
}
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 11px;
  background: #21262d;
  color: #c9d1d9;
}
.tag.link { cursor: pointer; transition: background 0.12s; }
.tag.link:hover { background: #30363d; }
.work-list { list-style: none; }
.work-list li {
  font-size: 11px;
  color: #c9d1d9;
  padding: 3px 0;
  border-bottom: 1px solid #21262d;
  font-style: italic;
}
.no-data { font-size: 11px; color: #444; }

/* ── Legend ──────────────────────────────────────────────────── */
#legend {
  display: flex;
  gap: 14px;
  align-items: center;
  padding: 7px 20px;
  background: #161b22;
  border-top: 1px solid #30363d;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #8b949e; }
.leg-line { width: 20px; height: 2px; border-radius: 1px; }

/* ── Tooltip ─────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  background: #1c2128;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  color: #e6edf3;
  pointer-events: none;
  z-index: 999;
  display: none;
  max-width: 180px;
}

.preset-btn {
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid #30363d;
  background: transparent;
  color: #8b949e;
  transition: all 0.15s;
  white-space: nowrap;
}
.preset-btn:hover  { color: #e6edf3; border-color: #555; }
.preset-btn.active { background: #21262d; color: #e6edf3; border-color: #555; }

#preset-desc {
  width: 100%;
  font-size: 10px;
  color: #555;
  padding: 0 20px 5px;
  background: #161b22;
  margin-top: -3px;
}

/* ── Search ── */
#search-wrap {
  position: relative;
  margin-left: auto;
}
#search-input {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #e6edf3;
  font-size: 12px;
  padding: 5px 10px;
  width: 200px;
  outline: none;
  transition: border-color 0.15s;
}
#search-input:focus  { border-color: #58a6ff; }
#search-input::placeholder { color: #555; }
#search-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  width: 240px;
  background: #1c2128;
  border: 1px solid #30363d;
  border-radius: 8px;
  overflow: hidden;
  z-index: 500;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.search-item {
  padding: 8px 12px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.1s;
}
.search-item:hover { background: #30363d; }
.search-item-name  { color: #e6edf3; }
.search-item-era   { font-size: 10px; color: #8b949e; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <span class="header-title">Philosophy Knowledge Graph</span>
  <div class="view-tabs">
    <button class="tab" id="tab-l1" onclick="setView('l1')">Clusters</button>
    <button class="tab active" id="tab-l2" onclick="setView('l2')">Graph</button>
  </div>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search philosopher…" autocomplete="off" spellcheck="false">
    <div id="search-dropdown"></div>
  </div>
  <span class="header-stats">217 thinkers &nbsp;·&nbsp; 1000 connections &nbsp;·&nbsp; 10 clusters</span>
</header>

<div id="filter-bar">
  <span class="filter-label">Cluster</span>
  <div id="chips"></div>
  <div style="width:1px;background:#30363d;align-self:stretch;margin:0 4px"></div>
  <span class="filter-label">Edges</span>
  <div id="edge-chips"></div>
  <div style="width:1px;background:#30363d;align-self:stretch;margin:0 4px"></div>
  <span class="filter-label">View</span>
  <button class="preset-btn active" id="preset-none"      onclick="setPreset('none')">Focus</button>
  <button class="preset-btn"        id="preset-influences" onclick="setPreset('influences')">Influences</button>
  <button class="preset-btn"        id="preset-debates"   onclick="setPreset('debates')">Debates</button>
  <button class="preset-btn"        id="preset-all"       onclick="setPreset('all')">All</button>
</div>
<div id="preset-desc">Click any thinker to explore their connections</div>

<div class="main">
  <div id="community-grid"></div>
  <div id="cy"></div>
  <div id="info-card"></div>
</div>

<div id="legend">
  <span style="font-size:10px;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:.08em">Edges</span>
  <div class="leg"><div class="leg-line" style="background:#4a9eff"></div>built on</div>
  <div class="leg"><div class="leg-line" style="background:#ffa500"></div>critiqued</div>
  <div class="leg"><div class="leg-line" style="background:#50fa7b"></div>student of</div>
  <div class="leg"><div class="leg-line" style="background:#ff5555"></div>refuted</div>
  <div class="leg"><div class="leg-line" style="background:#c77dff"></div>collaborated</div>
</div>

<div id="tooltip"></div>

eption of equality focused on hierarchical social relations. She also contributed significantly to the philosophy of value and the critique of markets.", "born": 1959, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 2, "show_label": false}, "position": {"x": 169.31249391176863, "y": -103.057059761179}}, {"data": {"id": "john_collier", "label": "John Collier", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "John Collier is a philosopher working in metaphysics and philosophy of science who has collaborated with James Ladyman and Don Ross on naturalized metaphysics and structural realism. He has contributed to discussions of causation, information, and biological autonomy, often working at the intersection of metaphysics and the natural sciences. His work supports the view that metaphysics should be disciplined by the findings of science.", "born": 1950, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 2, "show_label": false}, "position": {"x": 160.27985395306172, "y": 174.63127431890973}}, {"data": {"id": "luc_bovens", "label": "Luc Bovens", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Luc Bovens is a Belgian-American philosopher known for his work in Bayesian epistemology, decision theory, and the philosophy of science. His book 'Bayesian Epistemology' (co-authored with Stephan Hartmann) applies probabilistic reasoning to questions of coherence, reliability, and belief revision. Bovens has also written widely on topics in applied ethics including environmental ethics and health policy.", "born": 1963, "died": null, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 2, "show_label": false}, "position": {"x": 195 losopher of science specializing in the philosophy of neuroscience and the theory of scientific explanation. He is best known for developing the mechanistic account of explanation, arguing that neuroscience explains phenomena by identifying the mechanisms — components, activities, and their organization — that produce them. His work has been highly influential in integrating philosophy of science with the practice of neurobiology.", "born": 1967, "died": null, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 3, "show_label": false}, "position": {"x": 376.5437047261984, "y": 117.41476578684322}}, {"data": {"id": "kanada", "label": "Kanada", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Kanada (circa 2nd century BCE–2nd century CE) was an ancient Indian philosopher and founder of the Vaisheshika school of philosophy. His 'Vaisheshika Sutra' developed one of the earliest systematic atomistic ontologies, categorizing reality into substances, qualities, actions, universals, particulars, and inherence. His work represents a pioneering contribution to Indian metaphysics and philosophy of nature.", "born": -600, "died": -500, "community_id": "c9", "community_label": "Classical Indian Philosophy", "color": "#50fa7b", "era_color": "#c9a227", "degree": 3, "show_label": false}, "position": {"x": -183.80339099800455, "y": -193.22864446786465}}, {"data": {"id": "ross_e_g_upshur", "label": "Ross E. G. Upshur", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Ross E. G. Upshur is a contemporary Canadian philosopher and physician who works at the intersection of philosophy of medicine, epidemiology, and public health ethics. He has contributed to debates about evidence-based medicine, the foundations of medical knowledge, and the ethical dimensions of public health decision-making. His interdisciplinary work bridges clinical practice and philosophical reflection on medicine.", "born": 1960, "died": null, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 3, "show_label": false}, "position": {"x": 280.3689746921056, "y": 18.80104188996836}}, {"data": {"id": "susan_hurley", "label": "Susan Hurley", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Susan Hurley (1954–2007) was a British philosopher who made important contributions to moral philosophy, philosophy of mind, and political theory. In 'Natural Reasons,' she argued against the view that moral judgments are merely expressions of desire, developing an account of practical reason grounded in coherence rather than Humean instrumentalism. Her later work addressed shared agency, democracy, and the cognitive science of action.", "born": 1954, "died": 2007, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 3, "show_label": false}, "position": {"x": 245.33449826699442, "y": -304.2432943883182}}, {"data": {"id": "william_rowe", "label": "William Rowe", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "William Rowe (1931–2015) was an American philosopher of religion best known for developing the evidential argument from evil against the existence of God, arguing that the existence of gratuitous suffering makes theism improbable. He distinguished between 'friendly atheism' and 'unfriendly atheism,' maintaining that one can rationally reject theism while acknowledging that some theists hold their beliefs reasonably. His careful analytic work helped set the terms for contemporary debates on the problem of evil.", "born": 1931, "died": 2015, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 3, "show_label": false}, "position": {"x": 235.3483494777948, "y": -237.45562114331844}}, {"data": {"id": "zeami_motokiyo", "label": "Zeami Motokiyo", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Zeami Motokiyo (c. 1363–c. 1443) was a Japanese playwright, actor, and aesthetic theorist who codified the art of Noh theatre and developed its foundational philosophical framework. His concept of 'yūgen' — a profound, mysterious beauty — and 'hana' (flower), referring to the transformative quality of performance, became central to Japanese aesthetics. He is regarded as the greatest theorist of classical Japanese theatre and a key figure in East Asian aesthetics.", "born": 1363, "died": 1443, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#a0522d", "degree": 3, "show_label": false}, "position": {"x": 21.84331668956863, "y": 212.77318382720918}}, {"data": {"id": "allan_gibbard", "label": "Allan Gibbard", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Allan Gibbard (born 1942) is an American philosopher specializing in ethics, the philosophy of language, and metaethics. He is best known for developing norm-expressivism, the view that moral judgments express states of accepting norms rather than describing facts, most fully elaborated in 'Thinking How to Live'. His work bridges formal philosophical logic and substantive questions in ethical theory.", "born": 1942, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 237.102527259564, "y": -203.57357091394977}}, {"data": {"id": "charles_weingartner", "label": "Charles Weingartner", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Charles Weingartner (1922–2004) was an American educator and media critic who co-authored 'Teaching as a Subversive Activity' with Neil Postman, a landmark critique of conventional education. The book argued that schools should cultivate critical inquiry and 'crap detection' rather than passive transmission of established knowledge. Weingartner's work was influential in progressive education movements of the late twentieth century.", "born": 1922, "died": 2004, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 327.44729031006386, "y": 152.00199031609992}}, {"data": {"id": "david_spurrett", "label": "David Spurrett", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "David Spurrett is a South African philosopher of mind and science best known as a co-author (with James Ladyman and Don Ross) of 'Every Thing Must Go: Metaphysics Naturalized,' a landmark work advocating for a scientifically informed metaphysics. His work challenges traditional analytic metaphysics and argues that philosophy should be continuous with and constrained by the natural sciences. He contributes to debates about causation, naturalism, and the philosophy of cognitive science.", "born": 1969, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 158.13744281127683, "y": 304.27329998320454}}, {"data": {"id": "dewi_zephaniah_phillips", "label": "Dewi Zephaniah Phillips", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "D.Z. Phillips (1934–2006) was a Welsh philosopher of religion who developed a Wittgensteinian approach to religious language and belief. He argued, following Wittgenstein, that religious discourse has its own grammar and should not be evaluated by external metaphysical or scientific standards. His work is associated with the 'Wittgensteinian fideism' debate and contributed significantly to philosophy of religion and ethics.", "born": 1934, "died": 2006, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 42.086983802725754, "y": -178.39303290408276}}, {"data": {"id": "don_marquis", "label": "Don Marquis", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Don Marquis (born 1935) is an American philosopher known primarily for his influential paper 'Why Abortion is Immoral,' in which he argues that abortion is morally wrong because it deprives the fetus of a 'future like ours.' His argument attempts to ground the wrongness of abortion in a secular, non-religious framework by appeal to the value of future experiences. The paper has been widely discussed and debated in bioethics and applied ethics.", "born": 1935, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 189.40945012024122, "y": -98.49669628036091}}, {"data": {"id": "don_ross", "label": "Don Ross", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Don Ross is a contemporary philosopher and economist known for his work in metaphysics, philosophy of science, and economics. He is best known for co-authoring 'Every Thing Must Go: Metaphysics Naturalized,' which argues that metaphysics should be continuous with and constrained by natural science. His work challenges traditional analytic metaphysics and promotes a scientifically informed view of reality.", "born": 1962, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 127.42726812619397, "y": 311.2241607870799}}, {"data": {"id": "erwin_schr_dinger", "label": "Erwin Schrödinger", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Erwin Schrödinger (1887–1961) was an Austrian-Irish physicist and philosopher best known for his foundational contributions to quantum mechanics and his famous thought experiment of Schrödinger's cat. Beyond physics, he made significant philosophical contributions through his book 'What Is Life?' which influenced the philosophy of biology and the understanding of life in terms of physics. His reflections on consciousness and the self drew on Vedantic philosophy and raised enduring questions about the relationship between mind and matter.", "born": 1887, "died": 1961, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 4, "show_label": false}, "position": {"x": 351.890567315417, "y": -17.41183043651054}}, {"data": {"id": "felix_guattari", "label": "Felix Guattari", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Félix Guattari (1930–1992) was a French psychoanalyst, philosopher, and political activist who collaborated extensively with Gilles Deleuze on major philosophical works. Together they developed concepts such as schizoanalysis, deterritorialization, and rhizome as alternatives to structuralist and psychoanalytic frameworks. Guattari's work deeply influenced critical theory, cultural studies, and the philosophy of subjectivity.", "born": 1930, "died": 1992, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 310.80655147777463, "y": -35.95074855458131}}, {"data": {"id": "honen", "label": "Honen", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Honen was a Japanese Buddhist monk of the twelfth century who founded the Jōdo-shū (Pure Land) school of Buddhism in Japan, emphasizing salvation through the exclusive nembutsu practice—recitation of Amida Buddha's name. He argued that in the degenerate age of dharma, ordinary people could achieve rebirth in the Pure Land through sincere faith and recitation alone, rather than through complex monastic disciplines. His teachings profoundly shaped Japanese religious culture and directly influenced his disciple Shinran.", "born": 1133, "died": 1212, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#a0522d", "degree": 4, "show_label": false}, "position": {"x": 26.53893413079758, "y": 361.6784406685341}}, {"data": {"id": "isvarakrsna", "label": "Isvarakrsna", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Isvarakrsna was an ancient Indian philosopher, probably active in the fourth or fifth century CE, who authored the 'Sankhya Karika,' the foundational systematic text of the Samkhya school of Indian philosophy. The text presents a dualist metaphysics distinguishing between purusha (pure consciousness) and prakriti (primordial matter) and outlines the evolution of the cosmos from their interaction. The 'Sankhya Karika' became the definitive statement of Samkhya philosophy and profoundly influenced Indian thought, including Yoga philosophy.", "born": 350, "died": 425, "community_id": "c9", "community_label": "Classical Indian Philosophy", "color": "#50fa7b", "era_color": "#c9a227", "degree": 4, "show_label": false}, "position": {"x": -137.26878508741618, "y": -179.22057063477186}}, {"data": {"id": "jaap_van_brakel", "label": "Jaap van Brakel", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Jaap van Brakel is a Dutch philosopher of chemistry who has explored the philosophical foundations of chemistry, arguing for the irreducibility of chemical kinds to physics and emphasizing the autonomy of chemical ontology. He has critically examined the concept of natural kinds and the relationship between chemistry and other sciences. His work is foundational in the emerging field of philosophy of chemistry.", "born": 1943, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": -88.26545980710185, "y": -243.4392494588011}}, {"data": {"id": "judea_pearl", "label": "Judea Pearl", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Judea Pearl (born 1936) is an Israeli-American computer scientist and philosopher whose work revolutionized the study of causality and probabilistic reasoning. His book 'Causality' introduced the do-calculus and a structural causal model framework that distinguishes correlation from causal intervention. Pearl's contributions have transformed artificial intelligence, statistics, and the philosophy of causation.", "born": 1936, "died": null, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 183.20517657475034, "y": 154.12401456547607}}, {"data": {"id": "max_stirner", "label": "Max Stirner", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Max Stirner (1806–1856) was a German philosopher associated with Young Hegelianism whose work 'The Ego and Its Own' (1844) presented a radical critique of all fixed ideas—including God, state, morality, and humanity—in favor of the sovereign, self-creating individual. He is often considered a precursor to nihilism, existentialism, and anarchism, particularly individualist anarchism. His uncompromising egoism and critique of ideology influenced Nietzsche and anarchist thought.", "born": 1806, "died": 1856, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 4, "show_label": false}, "position": {"x": 222.0483123326384, "y": -174.2844634113604}}, {"data": {"id": "neil_postman", "label": "Neil Postman", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Neil Postman (1931–2003) was an American media theorist and cultural critic who argued that media technologies profoundly shape human thought, values, and social institutions. Best known for works like 'Amusing Ourselves to Death', he critiqued how television and later digital media undermine serious discourse and education. His work remains a foundational reference for debates about technology, literacy, and critical pedagogy.", "born": 1931, "died": 2003, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 207.78488240634715, "y": 38.922576210433}}, {"data": {"id": "peter_railton", "label": "Peter Railton", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Peter Railton (born 1950) is an American moral philosopher known for his influential contributions to metaethics and moral realism. He defended a sophisticated form of naturalistic moral realism, arguing that moral facts can be understood in terms of idealized subjective interests and that moral properties are reducible to natural properties. His work on moral motivation, objectivity, and the relationship between facts and values has been central to contemporary metaethics.", "born": 1950, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 153.63972230427657, "y": -321.289683549205}}, {"data": {"id": "ray_turner", "label": "Ray Turner", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Ray Turner is a contemporary British philosopher specializing in the philosophy of computer science and computational artifacts. He has worked to establish the philosophical foundations of computer science as a discipline, examining the nature of programs, specifications, and the ontology of computational entities. His work bridges analytic philosophy of science and the theoretical foundations of computing.", "born": 1950, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": -6.4868116372054025e-15, "y": -408.6458911620982}}, {"data": {"id": "stephen_stich", "label": "Stephen Stich", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Stephen Stich (born 1943) is an American philosopher of mind and cognitive science who has challenged traditional conceptions of rationality, folk psychology, and epistemic norms. In 'The Fragmentation of Reason,' he argues that there is no single, culturally neutral standard of rationality and that cognitive science undermines traditional epistemology. His work has been influential in experimental philosophy and the naturalization of the mind.", "born": 1943, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 4, "show_label": false}, "position": {"x": 129.71214738939727, "y": -354.889343212433}}, {"data": {"id": "swami_swatamarama", "label": "Swami Swatamarama", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Swami Swatamarama was a 15th-century Indian yogi and Sanskrit scholar, best known as the author of the Hatha Yoga Pradipika, one of the most influential texts on Hatha Yoga. His work systematized the physical and breathing practices of yoga, providing detailed instructions on asanas, pranayama, mudras, and samadhi. The text remains a foundational reference for yoga practitioners and scholars worldwide.", "born": 1300, "died": 1400, "community_id": "c9", "community_label": "Classical Indian Philosophy", "color": "#50fa7b", "era_color": "#a0522d", "degree": 4, "show_label": false}, "position": {"x": -195.49925451563908, "y": -280.0787022330401}}, {"data": {"id": "g_e_m_anscombe", "label": "G.E.M. Anscombe", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "G.E.M. Anscombe (1919–2001) was a British analytic philosopher and one of the most important moral philosophers of the twentieth century. Her 1958 paper 'Modern Moral Philosophy' is credited with reviving virtue ethics and introducing the concept of 'consequentialism' as a critical label. She also made major contributions to the philosophy of action, intention, and the philosophy of mind, as well as being a committed Wittgenstein scholar.", "born": 1919, "died": 2001, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": -138.7590205348336, "y": 283.06453351618353}}, {"data": {"id": "hakuin_ekaku", "label": "Hakuin Ekaku", "type": "Philosopher", "era": "Early Modern", "tradition": "Eastern", "abstract": "Hakuin Ekaku (1686–1769) was a Japanese Zen Buddhist monk widely regarded as the revitalizer of the Rinzai school of Zen. He systematized koan practice as a rigorous method for achieving enlightenment and produced extensive writings and artwork conveying Zen teachings to laypeople. His reforms shaped the Rinzai tradition that continues to the present day.", "born": 1686, "died": 1769, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#1a6b8a", "degree": 5, "show_label": false}, "position": {"x": 56.96610181796825, "y": 305.3629426195662}}, {"data": {"id": "henrik_walter", "label": "Henrik Walter", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Henrik Walter is a German neurophilosopher and psychiatrist who investigates the neural and philosophical dimensions of free will and autonomy. His major work argues against libertarian free will while developing a compatibilist concept of 'natural autonomy' grounded in neuroscientific findings. He bridges philosophy of mind, neuroscience, and ethics to address questions of moral responsibility.", "born": 1961, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": 105.7777071401814, "y": 216.71241281106455}}, {"data": {"id": "j_l_schellenberg", "label": "J.L. Schellenberg", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "J.L. Schellenberg is a Canadian philosopher of religion known primarily for developing the argument from divine hiddenness as a challenge to theism. He argues that if a perfectly loving God existed, all capable persons would be capable of belief in God, yet non-belief persists, thus challenging traditional theism. His work has significantly shaped contemporary debates in philosophy of religion.", "born": 1959, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": 72.01652939959608, "y": -204.86410193975655}}, {"data": {"id": "jonathan_kvanvig", "label": "Jonathan Kvanvig", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Jonathan Kvanvig (born 1954) is an American epistemologist known for challenging the dominance of knowledge as the central concept in epistemology. In 'The Value of Knowledge and the Pursuit of Understanding,' he argues that understanding—not knowledge—is the epistemic state of highest value. His work has significantly shaped contemporary debates about epistemic value and the nature of understanding.", "born": 1954, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": -120.38670729569031, "y": -295.8492106918004}}, {"data": {"id": "judith_jarvis_thomson", "label": "Judith Jarvis Thomson", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Judith Jarvis Thomson (1929–2020) was an American analytic philosopher best known for her work in ethics and metaphysics. Her 1971 paper 'A Defense of Abortion' introduced the famous 'violinist' thought experiment, arguing that even if a fetus has a right to life, abortion can be morally permissible. She also developed influential accounts of rights, moral permissibility, and the metaphysics of ordinary objects.", "born": 1929, "died": 2020, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": 63.342432419897406, "y": -286.7109511082529}}, {"data": {"id": "luce_irigaray", "label": "Luce Irigaray", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Luce Irigaray is a Belgian-French feminist philosopher and psychoanalytic theorist whose 'Speculum of the Other Woman' critiqued the Western philosophical tradition for representing woman only as a deficient reflection of man and erasing genuine feminine subjectivity. She argues for a radical reconceptualization of sexual difference that affirms women's specificity rather than assimilating it to a supposedly universal (male) standard. Her work has been highly influential in feminist philosophy, psychoanalysis, and continental theory.", "born": 1930, "died": null, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": 180.85408060987922, "y": -125.1468618354003}}, {"data": {"id": "marcus_aurelius", "label": "Marcus Aurelius", "type": "Philosopher", "era": "Ancient", "tradition": "Western", "abstract": "Marcus Aurelius was a Roman emperor and Stoic philosopher whose private philosophical journal, the Meditations, records his reflections on duty, virtue, mortality, and the practice of Stoic principles amid the pressures of imperial rule. Deeply influenced by earlier Stoics, he emphasized the rational governance of one's own thoughts and emotions, the acceptance of fate, and service to the common good. The Meditations remain one of the most widely read works of Stoic philosophy and a touchstone for practical ethics.", "born": 121, "died": 180, "community_id": "c7", "community_label": "Medieval Scholastic Philosophy", "color": "#e76f51", "era_color": "#c9a227", "degree": 5, "show_label": false}, "position": {"x": -334.83636267002606, "y": 86.52475842498532}}, {"data": {"id": "michael_a_smith", "label": "Michael A. Smith", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Michael A. Smith (born 1954) is an Australian moral philosopher best known for 'The Moral Problem' (1994), in which he attempts to reconcile the practicality of moral judgments with moral realism through a sophisticated analysis of desire and rationality. He developed a version of cognitivist moral realism that addresses the Humean challenge that beliefs alone cannot motivate action. His work has been central to debates in metaethics concerning the relationship between moral judgment, motivation, and rational agency.", "born": 1954, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": 143.963746015087, "y": -301.5457318487866}}, {"data": {"id": "pata_jali", "label": "Patañjali", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Patañjali (c. 2nd century BCE or CE) was an Indian sage credited with compiling the Yoga Sutras, a foundational text of classical yoga philosophy. His systematic exposition of the eight-limbed path (ashtanga) provided a comprehensive theory of mind, consciousness, and liberation within the Samkhya-Yoga tradition. Patañjali's work remains central to Hindu philosophy of mind and continues to shape global contemplative practices.", "born": -200, "died": -100, "community_id": "c9", "community_label": "Classical Indian Philosophy", "color": "#50fa7b", "era_color": "#c9a227", "degree": 5, "show_label": false}, "position": {"x": -202.77806319416692, "y": -226.52475842498527}}, {"data": {"id": "peter_carruthers", "label": "Peter Carruthers", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Peter Carruthers (born 1952) is a British philosopher of mind and cognitive science who has developed an influential higher-order thought theory of consciousness. In 'The Architecture of the Mind' and related works, he argues that the mind has a massively modular structure and that conscious thought arises from a broadcasting system that makes mental states globally accessible. His work bridges analytic philosophy of mind, cognitive science, and debates about animal consciousness.", "born": 1952, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": 232.3398692006743, "y": 173.78503459751204}}, {"data": {"id": "peter_unger", "label": "Peter Unger", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Peter Unger (born 1942) is an American philosopher known for his radical skeptical arguments in epistemology and later work in metaphysics and ethics. In 'Ignorance: A Case for Scepticism' he argued that knowledge is impossible, and he later developed 'ontological nihilism' denying the existence of ordinary objects. His provocative positions have been influential in debates about skepticism, ordinary language, and the nature of consciousness.", "born": 1942, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": -13.470105098469944, "y": -382.3156062005432}}, {"data": {"id": "r_paul_thompson", "label": "R. Paul Thompson", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "R. Paul Thompson is a contemporary philosopher of biology and medicine who has contributed to understanding the logical and epistemological structure of biological and medical theories. His work examines the nature of scientific explanation, reduction, and the foundations of medical knowledge. He has been particularly influential in articulating how philosophy of science applies to the biomedical sciences.", "born": 1947, "died": null, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": 243.3085269382525, "y": 21.844701863290098}}, {"data": {"id": "shinran", "label": "Shinran", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Shinran (1173–1263) was a Japanese Buddhist monk and the founder of Jōdo Shinshū (True Pure Land Buddhism), the most widely practiced Buddhist sect in Japan. He radicalized the Pure Land teaching of his master Honen by insisting that salvation comes entirely through faith in Amida Buddha's compassion, not through self-power or monastic discipline. His work 'Kyogyoshinsho' systematically articulated this vision, profoundly shaping Japanese religious thought.", "born": 1173, "died": 1263, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#a0522d", "degree": 5, "show_label": false}, "position": {"x": -45.9799648960552, "y": 200.36036466979903}}, {"data": {"id": "sunzi", "label": "Sunzi", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Sunzi (fl. 5th century BCE) was an ancient Chinese military strategist and philosopher traditionally credited with writing 'The Art of War,' one of the most influential texts in world history. The text offers a systematic philosophy of strategy, deception, and adaptability that transcends military contexts to inform statecraft, business, and ethics. Sunzi's thought reflects key Daoist and Confucian themes and remains foundational in Chinese strategic philosophy.", "born": -544, "died": -496, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#c9a227", "degree": 5, "show_label": false}, "position": {"x": -6.800470774624521, "y": 215.29784258993325}}, {"data": {"id": "tim_lewens", "label": "Tim Lewens", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Tim Lewens (born 1973) is a British philosopher of science at the University of Cambridge, working on the philosophy of biology, evolutionary theory, and the foundations of science. He is known for his nuanced engagement with the philosophical implications of evolutionary biology and for accessible introductions to the philosophy of science. His work bridges technical philosophy of science and broader cultural and ethical questions about scientific inquiry.", "born": 1973, "died": null, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 5, "show_label": false}, "position": {"x": 329.8993279947084, "y": 47.846611166770934}}, {"data": {"id": "vyasa", "label": "Vyasa", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Vyasa is a legendary sage and revered figure in Hindu tradition, traditionally credited with composing or compiling some of the most important texts of Indian philosophy, including the Brahma Sutras, the Mahabharata, and the Puranas. His Brahma Sutras systematize the teachings of the Upanishads and serve as a foundational text for Vedanta philosophy. Vyasa's influence on Indian philosophical and religious thought is immeasurable and enduring.", "born": -1500, "died": -1000, "community_id": "c9", "community_label": "Classical Indian Philosophy", "color": "#50fa7b", "era_color": "#c9a227", "degree": 5, "show_label": false}, "position": {"x": -135.98306959434288, "y": -276.0558707732801}}, {"data": {"id": "clive_bell", "label": "Clive Bell", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Clive Bell (1881–1964) was a British art critic and aesthetician associated with the Bloomsbury Group. He is best known for his concept of 'significant form,' the idea that what makes something art is a distinctive aesthetic quality independent of representational content. His work influenced twentieth-century formalist aesthetics and debates about the definition of art.", "born": 1881, "died": 1964, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#2e7d32", "degree": 6, "show_label": false}, "position": {"x": 216.85186953009557, "y": 267.2096882347504}}, {"data": {"id": "cora_diamond", "label": "Cora Diamond", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Cora Diamond (born 1937) is an American philosopher working in ethics, philosophy of language, and the interpretation of Wittgenstein. She is known for her 'resolute' reading of Wittgenstein's Tractatus, arguing that its propositions are nonsensical in a therapeutic rather than substantive sense. Her work has been influential in debates about ethical thought, the limits of language, and the nature of philosophical method.", "born": 1937, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 6, "show_label": false}, "position": {"x": 103.10768556653682, "y": -176.89231443346318}}, {"data": {"id": "jeremy_butterfield", "label": "Jeremy Butterfield", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Jeremy Butterfield is a British philosopher of physics at Cambridge known for his work on the foundations of quantum mechanics, the nature of time, and emergence in physics. He has written extensively on the relationship between classical and quantum mechanics, as well as on reduction and emergence in the philosophy of science. His work bridges technical physics and philosophical analysis with rigor.", "born": 1954, "died": null, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 6, "show_label": false}, "position": {"x": 240.6832981308605, "y": 158.59150090879342}}, {"data": {"id": "karl_l_with", "label": "Karl Löwith", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Karl Löwith (1897–1973) was a German philosopher who studied the relationship between history, theology, and modernity. In 'Meaning in History' he argued that modern philosophies of history are secularized forms of Christian eschatology. His work offers a profound critique of historicism and the idea of historical progress.", "born": 1897, "died": 1973, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#2e7d32", "degree": 6, "show_label": false}, "position": {"x": 191.19041637530404, "y": -80.1323461119489}}, {"data": {"id": "karl_pearson", "label": "Karl Pearson", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Karl Pearson (1857–1936) was a British mathematician, statistician, and philosopher of science who founded the discipline of mathematical statistics. In 'The Grammar of Science' he developed a positivist philosophy of science emphasizing that scientific knowledge is constructed from sensory data and mental organization rather than a mind-independent reality. He made foundational contributions to statistics including the chi-squared test, correlation, and regression analysis.", "born": 1857, "died": 1936, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#2e7d32", "degree": 6, "show_label": false}, "position": {"x": 80.21563135091398, "y": -296.0994343315258}}, {"data": {"id": "michel_bitbol", "label": "Michel Bitbol", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Michel Bitbol (born 1954) is a French philosopher of physics who has worked extensively on the philosophical foundations of quantum mechanics, drawing on Kantian and phenomenological traditions. He developed a neo-Kantian, non-representationalist interpretation of quantum mechanics that emphasizes the role of the knowing subject in physical theorizing. His work connects the philosophy of science with phenomenology, particularly engaging with Schrödinger's philosophical writings.", "born": 1954, "died": null, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 6, "show_label": false}, "position": {"x": 244.1076891133596, "y": -158.9766272806929}}, {"data": {"id": "miyamoto_musashi", "label": "Miyamoto Musashi", "type": "Philosopher", "era": "Early Modern", "tradition": "Eastern", "abstract": "Miyamoto Musashi (c. 1584–1645) was a legendary Japanese swordsman, ronin, and philosopher whose 'The Book of Five Rings' (Gorin no Sho) articulates a philosophy of strategy, martial arts, and mental discipline. His work extends beyond combat technique to encompass broader philosophical insights about timing, perception, adaptability, and the mastery of mind over circumstance. Musashi is regarded as a cultural icon in Japan and his strategic philosophy continues to be studied in contexts ranging from martial arts to business and leadership.", "born": 1584, "died": 1645, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#1a6b8a", "degree": 6, "show_label": false}, "position": {"x": -84.0601208208859, "y": 262.1324697447459}}, {"data": {"id": "paul_ramsey", "label": "Paul Ramsey", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Paul Ramsey (1913–1988) was an American Protestant theologian and ethicist who pioneered the field of biomedical ethics from a Christian moral perspective. His books 'The Patient as a Person' and 'Fabricated Man' raised foundational questions about medical research ethics, patient rights, and the limits of biomedical technology. Ramsey is considered one of the founding figures of modern bioethics and insisted on the inviolability of human dignity in medical contexts.", "born": 1913, "died": 1988, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 6, "show_label": false}, "position": {"x": -170.8100360469598, "y": 183.19300623932392}}, {"data": {"id": "ruth_millikan", "label": "Ruth Millikan", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Ruth Millikan (born 1933) is an American philosopher known for her naturalistic theory of mental content and biological function, developed in works such as 'Language, Thought, and Other Biological Categories.' She introduced the concept of 'proper functions,' grounding intentionality and linguistic meaning in evolutionary and teleological terms. Her work has been highly influential in philosophy of mind, philosophy of language, and the naturalization of semantics.", "born": 1933, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 6, "show_label": false}, "position": {"x": 256.40872287626183, "y": 194.99987363375146}}, {"data": {"id": "b_f_skinner", "label": "B.F. Skinner", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "B.F. Skinner (1904–1990) was an American psychologist and philosopher of science who developed the theory of operant conditioning and radical behaviorism. He argued that all behavior is shaped by reinforcement and punishment from the environment, rejecting appeals to inner mental states as explanatory. His work was highly influential in psychology, education, and philosophy of mind, though also widely criticized for its denial of mentalism.", "born": 1904, "died": 1990, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": 357.99611835933655, "y": 86.52475842498527}}, {"data": {"id": "dogen_zenji", "label": "Dogen Zenji", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Dogen Zenji (1200–1253) was a Japanese Buddhist monk, poet, and philosopher who founded the Soto school of Zen Buddhism in Japan. His major work 'Shobogenzo' is a sophisticated philosophical treatise exploring the nature of Buddha-nature, being-time, and the practice of zazen (seated meditation). He is considered one of the most original and profound thinkers in Japanese philosophical history.", "born": 1200, "died": 1253, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#a0522d", "degree": 7, "show_label": false}, "position": {"x": 62.52599877541899, "y": 280.0}}, {"data": {"id": "george_dickie", "label": "George Dickie", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "George Dickie (1926–2020) was an American philosopher of art best known for developing the institutional theory of art, which holds that something becomes art by virtue of being conferred that status by the 'artworld.' His work responded to and refined Arthur Danto's insights, providing a sociological and institutional account of how artworks are defined. He is a central figure in analytic aesthetics.", "born": 1926, "died": 2020, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": 81.88928810545256, "y": 271.2746638462048}}, {"data": {"id": "harriet_taylor_mill", "label": "Harriet Taylor Mill", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Harriet Taylor Mill (1807–1858) was a British philosopher and women's rights advocate who made significant contributions to liberal and feminist thought, often in close collaboration with John Stuart Mill. Her essay 'The Enfranchisement of Women' and her influence on The Subjection of Women argued forcefully for equal political and social rights for women. She is a pioneering figure in the history of feminism whose independent intellectual contributions have gained increasing recognition.", "born": 1807, "died": 1858, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#2e7d32", "degree": 7, "show_label": false}, "position": {"x": 119.77963706665068, "y": -126.58951176543898}}, {"data": {"id": "hilary_kornblith", "label": "Hilary Kornblith", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Hilary Kornblith is an American epistemologist who is a leading proponent of naturalistic epistemology, arguing that epistemology should be continuous with empirical science, especially cognitive science. He defends the view that knowledge is a natural kind—a phenomenon to be studied empirically rather than analyzed through conceptual intuitions alone. His work challenges traditional a priori approaches to epistemology and has significantly shaped debates between naturalists and their critics.", "born": 1952, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": -77.82886893609356, "y": -202.17113106390642}}, {"data": {"id": "kenneth_arrow", "label": "Kenneth Arrow", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Kenneth Arrow was an American economist and social theorist whose impossibility theorem demonstrated that no rank-order voting system can satisfy a set of fairness criteria simultaneously when there are more than two alternatives. His work in Social Choice and Individual Values revolutionized welfare economics and political philosophy by revealing fundamental limits of collective decision-making. Arrow's contributions bridged economics and philosophy, influencing theories of justice, rationality, and democratic theory.", "born": 1921, "died": 2017, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": 106.55171220105757, "y": -291.63739215825956}}, {"data": {"id": "laurence_bonjour", "label": "Laurence Bonjour", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Laurence BonJour is an American epistemologist known especially for his defense of coherentism in 'The Structure of Empirical Knowledge' and his subsequent turn toward a rationalist foundationalism. He argued that epistemic justification must be understood in terms of coherence among beliefs, criticizing foundationalist and externalist alternatives, before later defending a priori justification and moderate foundationalism. His work has been central to debates about the structure of knowledge and justification in contemporary analytic epistemology.", "born": 1943, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": -64.58917627208669, "y": -317.29057830742545}}, {"data": {"id": "lon_l_fuller", "label": "Lon L. Fuller", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Lon L. Fuller was an American legal philosopher who argued in 'The Morality of Law' that law has an internal morality consisting of procedural principles necessary for a legal system to function, such as generality, promulgation, non-retroactivity, and consistency. He challenged positivist legal theory by contending that these formal requirements are intrinsically connected to moral values and that an extreme departure from them results in something that is not truly law. Fuller's work is foundational in natural law theory and in debates about the relationship between law and morality.", "born": 1902, "died": 1978, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": -235.07110052464782, "y": 247.22285103837098}}, {"data": {"id": "ludwig_von_mises", "label": "Ludwig von Mises", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "Ludwig von Mises was an Austrian economist and philosopher who developed a comprehensive defense of classical liberalism and free-market economics grounded in the a priori science of human action he called 'praxeology.' His critique of socialist economic planning, arguing that rational allocation of resources is impossible without market prices, remains foundational in Austrian economics and libertarian political philosophy. Von Mises's epistemological and methodological contributions shaped the Austrian School and influenced broader debates about economic rationality and the limits of state intervention.", "born": 1881, "died": 1973, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#2e7d32", "degree": 7, "show_label": false}, "position": {"x": 125.8807266809265, "y": -286.2831517684896}}, {"data": {"id": "roger_scruton", "label": "Roger Scruton", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Roger Scruton (1944–2020) was a British philosopher known for his conservative political philosophy and his extensive work in aesthetics, particularly on music and architecture. He argued that aesthetic experience involves the perception of meaning and human expression in sensory form, and defended the importance of high culture and tradition against modernist abstraction. His prolific writings span philosophy, politics, cultural criticism, and the arts.", "born": 1944, "died": 2020, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": 307.85280276691617, "y": -154.01757976631615}}, {"data": {"id": "stephen_mumford", "label": "Stephen Mumford", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Stephen Mumford (born 1966) is a British philosopher specializing in metaphysics, particularly the ontology of properties, powers, and dispositions. His book 'Dispositions' offers a systematic defense of dispositional realism, arguing that properties are irreducibly powerful or dispositional in nature. He has also contributed significantly to the metaphysics of laws of nature and causation.", "born": 1966, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": 80.96471554800549, "y": -342.1264113140244}}, {"data": {"id": "susan_haack", "label": "Susan Haack", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Susan Haack (born 1945) is a British-American philosopher known for her work in epistemology, logic, and philosophy of science. She developed 'foundherentism,' a theory of justification that synthesizes elements of foundationalism and coherentism, and has been a vigorous critic of both postmodern philosophy and naive scientism. Her work defends a robust notion of truth and intellectual integrity against various forms of relativism.", "born": 1945, "died": null, "community_id": "c3", "community_label": "Pragmatism & Philosophy of Science", "color": "#c77dff", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": 290.0266303207556, "y": 40.72638227078819}}, {"data": {"id": "thomas_m_scanlon", "label": "Thomas M. Scanlon", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Thomas M. Scanlon (born 1940) is an American moral philosopher best known for his contractualist theory of morality, articulated in What We Owe to Each Other. He argues that moral wrongness consists in acting on principles that others could reasonably reject, grounding ethics in mutual justifiability rather than utility or duty. Scanlon's work has been highly influential in contemporary normative ethics and political philosophy.", "born": 1940, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 7, "show_label": false}, "position": {"x": 284.4866762247538, "y": -285.89440047281556}}, {"data": {"id": "zhou_dunyi", "label": "Zhou Dunyi", "type": "Philosopher", "era": "Medieval", "tradition": "Eastern", "abstract": "Zhou Dunyi (1017–1073) was a Chinese Neo-Confucian philosopher who is considered the founding thinker of the Neo-Confucian movement. His 'Taiji Tushuo' (Explanation of the Diagram of the Supreme Ultimate) synthesized Daoist cosmological concepts with Confucian ethical thought, describing how the universe unfolds from the Supreme Ultimate (taiji) to generate all things including human morality. His cosmological framework became foundational for later Neo-Confucian thinkers, especially Zhu Xi.", "born": 1017, "died": 1073, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#a0522d", "degree": 7, "show_label": false}, "position": {"x": 52.79654309833723, "y": 221.3634984952679}}, {"data": {"id": "blaise_pascal", "label": "Blaise Pascal", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Blaise Pascal (1623–1662) was a French mathematician, physicist, and religious philosopher whose 'Pensées' offered a profound defense of the Christian faith through reason, sentiment, and the famous 'Pascal's Wager.' He argued that the human condition is marked by wretchedness and grandeur, and that faith requires a leap beyond purely rational demonstration. Pascal's probabilistic argument for belief in God and his analysis of the human heart remain influential in philosophy of religion and existentialist thought.", "born": 1623, "died": 1662, "community_id": "c5", "community_label": "Early Modern Rationalism", "color": "#ffd166", "era_color": "#1a6b8a", "degree": 8, "show_label": true}, "position": {"x": -235.69130529089585, "y": -48.14790510498043}}, {"data": {"id": "desiderius_erasmus", "label": "Desiderius Erasmus", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Desiderius Erasmus (c. 1466–1536) was a Dutch Renaissance humanist, theologian, and scholar who was the foremost intellectual of the northern Renaissance. He is best known for 'The Praise of Folly,' a satirical work criticizing the corruption of the Church and the pretensions of scholars. His advocacy for a return to the Greek sources of the New Testament and his humanist reform program made him a pivotal figure in the intellectual background of the Reformation.", "born": 1466, "died": 1536, "community_id": "c5", "community_label": "Early Modern Rationalism", "color": "#ffd166", "era_color": "#1a6b8a", "degree": 8, "show_label": false}, "position": {"x": -282.23433800638463, "y": -16.693568349000955}}, {"data": {"id": "isaiah_berlin", "label": "Isaiah Berlin", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Isaiah Berlin was a British philosopher and historian of ideas of the twentieth century, best known for his distinction between 'negative liberty' (freedom from interference) and 'positive liberty' (freedom to self-realization or self-mastery). He was a passionate defender of political pluralism—the view that there are multiple genuine and irreducibly conflicting ultimate values—against monistic political ideologies. His essays on liberty, nationalism, and the history of ideas have made him one of the most influential liberal political thinkers of the modern era.", "born": 1909, "died": 1997, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 8, "show_label": false}, "position": {"x": 106.22280597255173, "y": -191.8311747043359}}, {"data": {"id": "johann_gottlieb_fichte", "label": "Johann Gottlieb Fichte", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Johann Gottlieb Fichte was a German philosopher who was one of the founders of German Idealism, developing a systematic philosophy based on the self-positing activity of the 'I' (ego). His 'Foundations of the Science of Knowledge' radicalized Kantian philosophy by grounding all reality in the activity of the self, influencing subsequent idealist philosophers. He also made significant contributions to political philosophy and German nationalism.", "born": 1762, "died": 1814, "community_id": "c2", "community_label": "Continental & Existential Philosophy", "color": "#2ec4b6", "era_color": "#1a6b8a", "degree": 8, "show_label": false}, "position": {"x": 173.559392411038, "y": -44.60524804546462}}, {"data": {"id": "john_bickle", "label": "John Bickle", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "John Bickle is an American philosopher of neuroscience known for defending a ruthlessly reductive approach to the relationship between psychology and neuroscience. He developed 'new wave reductionism,' arguing that genuine reduction in science involves revision of higher-level theories in light of lower-level discoveries. His work challenges non-reductive physicalism and advocates for the explanatory primacy of molecular neuroscience.", "born": 1957, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 8, "show_label": false}, "position": {"x": 134.35026634032607, "y": 157.60820225901045}}, {"data": {"id": "keith_derose", "label": "Keith DeRose", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Keith DeRose is an American epistemologist best known for developing contextualism about knowledge attributions, the view that the truth conditions of 'knows' vary with the context of the speaker. His work on the Case for Contextualism addresses skeptical puzzles by arguing that knowledge standards shift depending on conversational context. He is a central figure in contemporary epistemology and debates about skepticism and epistemic standards.", "born": 1962, "died": null, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 8, "show_label": false}, "position": {"x": -92.02731320632277, "y": -304.6586442552401}}, {"data": {"id": "mengzi", "label": "Mengzi", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Mengzi (c. 372–289 BCE), known in the West as Mencius, was a Confucian philosopher who developed Confucius's moral philosophy by arguing that human nature is inherently good and that moral cultivation consists in extending innate moral sprouts. He made significant contributions to political philosophy, arguing that unjust rulers forfeit the Mandate of Heaven and may be legitimately overthrown. He is considered the 'Second Sage' of Confucianism and his text, the 'Mengzi', became one of the Four Books central to the Confucian canon.", "born": -372, "died": -289, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#c9a227", "degree": 8, "show_label": false}, "position": {"x": -67.43526391983315, "y": 294.33380783411025}}, {"data": {"id": "niccol_machiavelli", "label": "Machiavelli", "type": "Philosopher", "era": "Early Modern", "tradition": "Western", "abstract": "Niccolò Machiavelli (1469–1527) was an Italian Renaissance political theorist whose work 'The Prince' founded modern political philosophy by analyzing power in pragmatic, empirical terms rather than moral ideals. He argued that effective rulers must be willing to act ruthlessly and deceitfully when circumstances demand, separating politics from conventional morality. His legacy is the concept of 'Machiavellianism' and the realist tradition in political thought.", "born": 1469, "died": 1527, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#1a6b8a", "degree": 8, "show_label": true}, "position": {"x": -72.30273430435173, "y": 227.46898863681636}}, {"data": {"id": "samuel_scheffler", "label": "Samuel Scheffler", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Samuel Scheffler (born 1951) is an American moral and political philosopher best known for his critique of consequentialism and his defense of agent-centered prerogatives in ethical theory. He argues that individuals have moral latitude to give extra weight to their own projects and commitments beyond what impartial maximization would require. His later work explores collective obligations, the afterlife, and the significance of humanity's continuation.", "born": 1951, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 8, "show_label": false}, "position": {"x": 231.65519018899028, "y": -349.8742358224341}}, {"data": {"id": "andy_clark", "label": "Andy Clark", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Andy Clark (born 1957) is a British philosopher of mind and cognitive scientist known for developing the theory of the extended mind together with David Chalmers. He argues that cognitive processes are not confined to the brain but extend into the body and environment, and he has also been a leading theorist of predictive processing and embodied cognition. His work has fundamentally challenged internalist assumptions in cognitive science and philosophy of mind.", "born": 1957, "died": null, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": 218.5525137731767, "y": 226.5247584249853}}, {"data": {"id": "arthur_c_danto", "label": "Arthur C. Danto", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Arthur C. Danto (1924–2013) was an American philosopher and art critic best known for his institutional and historical theory of art. He coined the concept of the 'artworld' and argued that after Andy Warhol, art entered a post-historical phase in which any object could be art given the right theoretical context. His work bridges analytic philosophy and aesthetics in a distinctive and influential way.", "born": 1924, "died": 2013, "community_id": "c4", "community_label": "Philosophy of Mind & Cognitive Science", "color": "#80b918", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": 227.17199418003813, "y": 248.01266157706442}}, {"data": {"id": "david_gauthier", "label": "David Gauthier", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "David Gauthier (born 1932) is a Canadian moral philosopher best known for his attempt to ground morality in rational choice theory. In 'Morals by Agreement,' he argues that moral constraints can be derived from the rational self-interest of agents in a bargaining situation, without appeal to intuition or sentiment. His work represents a major contribution to contractarian ethics and the intersection of game theory and moral philosophy.", "born": 1932, "died": null, "community_id": "c1", "community_label": "Enlightenment & Liberal Political Thought", "color": "#f4845f", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": 230.47155300276455, "y": -140.08300868992117}}, {"data": {"id": "edmund_gettier", "label": "Edmund Gettier", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "Edmund Gettier (1927–2021) was an American philosopher famous almost entirely for a three-page paper published in 1963 that revolutionized epistemology. His paper 'Is Justified True Belief Knowledge?' presented counterexamples to the classical tripartite definition of knowledge as justified true belief, launching decades of debate about the nature of knowledge. Despite publishing very little else, his Gettier problem remains one of the most discussed puzzles in contemporary epistemology.", "born": 1927, "died": 2021, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": 9.010718768942388, "y": -211.55679585219636}}, {"data": {"id": "george_santayana", "label": "George Santayana", "type": "Philosopher", "era": "Modern", "tradition": "Western", "abstract": "George Santayana (1863–1952) was a Spanish-American philosopher, poet, and cultural critic associated with naturalism and critical realism. His work in aesthetics, particularly The Sense of Beauty, treated beauty as objectified pleasure and laid groundwork for naturalistic aesthetics. He also developed a rich metaphysical system in Realms of Being and is noted for his aphorism that those who cannot remember the past are condemned to repeat it.", "born": 1863, "died": 1952, "community_id": "c6", "community_label": "Contemporary Virtue & Natural Law Ethics", "color": "#ef476f", "era_color": "#2e7d32", "degree": 9, "show_label": false}, "position": {"x": -175.01378087044813, "y": 299.0941980715601}}, {"data": {"id": "h_p_grice", "label": "H.P. Grice", "type": "Philosopher", "era": "Contemporary", "tradition": "Western", "abstract": "H.P. Grice (1913–1988) was a British philosopher of language best known for his theory of conversational implicature and the cooperative principle. He argued that communication involves not only what is literally said but what is implicated, governed by maxims of quantity, quality, relation, and manner. His work fundamentally shaped pragmatics and the philosophy of language, bridging ordinary language philosophy and formal semantics.", "born": 1913, "died": 1988, "community_id": "c0", "community_label": "Analytic Philosophy & Logic", "color": "#4e9af1", "era_color": "#3a5a8c", "degree": 9, "show_label": false}, "position": {"x": -30.023620951343958, "y": -207.51656710771636}}, {"data": {"id": "han_fei", "label": "Han Fei", "type": "Philosopher", "era": "Ancient", "tradition": "Eastern", "abstract": "Han Fei (c. 280–233 BCE) was a Chinese philosopher and the preeminent theorist of Legalism, developing a comprehensive political philosophy centered on law (fa), statecraft (shu), and power (shi) as tools for effective governance. His synthesis, recorded in the Han Feizi, argued that rulers must rely on clear laws and institutional controls rather than virtue or personal relationships. Han Fei's ideas were influential in the unification of China under the Qin dynasty.", "born": -280, "died": -233, "community_id": "c8", "community_label": "Classical East Asian Philosophy", "color": "#a8dadc", "era_color": "#c9a227", "degree": 9, "show_label": false}, "position": {"x": 62.81357623967652, "
